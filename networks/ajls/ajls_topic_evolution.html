<style>
:root {
    --bg: #ffffff; --bg2: #f5f5f5; --bg3: #e8e8e8;

    --accent: #2563eb; --accent2: #dc2626; --accent-light: #dbeafe;
    --grid: rgba(0,0,0,0.08); --border: #ddd;
}
.dark-mode {
    --bg: #0a0a1a; --bg2: #141428; --bg3: #1e1e3a;
    --fg: #e0e0e0; --fg2: #aaa; --fg3: #777;
    --accent: #4a9eff; --accent2: #ff6b6b; --accent-light: #1a2a4a;
    --grid: rgba(255,255,255,0.05); --border: #333;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--fg); overflow-y: auto;
}

/* Toolbar */
#toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 20;
}
#toolbar h1 { font-size: 16px; font-weight: 700; white-space: nowrap; }
.spacer { flex-grow: 1; }
#toolbar button {
    font-size: 12px; padding: 5px 12px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--bg); color: var(--fg);
    cursor: pointer; white-space: nowrap;
}
#toolbar button:hover { background: var(--bg3); }

/* Tabs */
.tabs {
    display: flex; gap: 0; background: var(--bg2); border-bottom: 2px solid var(--border);
    padding: 0 16px;
}
.tab-btn {
    padding: 10px 22px; font-size: 14px; cursor: pointer;
    border: none; background: none; color: var(--fg3);
    border-bottom: 3px solid transparent; transition: all 0.2s;
    font-family: inherit; font-weight: 500;
}
.tab-btn:hover { color: var(--fg); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

/* Controls row */
.controls {
    display: flex; gap: 8px; padding: 10px 16px; align-items: center;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
}
.controls label { font-size: 13px; color: var(--fg2); cursor: pointer; }
.controls .btn-group { display: flex; gap: 0; }
.controls .btn-group button {
    font-size: 12px; padding: 4px 12px;
    border: 1px solid var(--border); background: var(--bg); color: var(--fg);
    cursor: pointer; font-family: inherit;
}
.controls .btn-group button:first-child { border-radius: 4px 0 0 4px; }
.controls .btn-group button:last-child { border-radius: 0 4px 4px 0; }
.controls .btn-group button + button { border-left: none; }
.controls .btn-group button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.controls .btn-group button:hover:not(.active) { background: var(--bg3); }

/* Main chart layout */
.chart-container {
    display: flex; padding: 12px 16px; gap: 16px; min-height: 500px;
}
.chart-area { flex: 1; min-width: 0; position: relative; }
.chart-area svg { width: 100%; display: block; }

/* Legend panel */
.legend-panel {
    width: 240px; min-width: 240px; max-height: calc(100vh - 160px);
    overflow-y: auto; background: var(--bg2); border-radius: 6px;
    border: 1px solid var(--border); padding: 8px 0;
}
.legend-panel::-webkit-scrollbar { width: 5px; }
.legend-panel::-webkit-scrollbar-thumb { background: var(--fg3); border-radius: 3px; }
.legend-header {
    font-size: 11px; font-weight: 700; color: var(--fg3);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 6px 12px 4px; border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
}
.legend-all-btn {
    display: flex; align-items: center; gap: 6px; padding: 5px 12px;
    cursor: pointer; font-size: 12px; font-weight: 600; color: var(--fg);
    border-bottom: 1px solid var(--border); margin-bottom: 4px;
}
.legend-all-btn:hover { background: var(--bg3); }
.legend-divider {
    font-size: 10px; font-weight: 700; color: var(--fg3);
    padding: 8px 12px 3px; text-transform: uppercase; letter-spacing: 0.5px;
    border-top: 1px solid var(--border); margin-top: 4px;
}
.legend-item {
    display: flex; align-items: center; gap: 6px; padding: 4px 12px;
    cursor: pointer; font-size: 12px; transition: opacity 0.15s;
}
.legend-item:hover { background: var(--bg3); }
.legend-item.dimmed { opacity: 0.25; }
.legend-swatch {
    width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
}
.legend-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.legend-count { font-size: 11px; color: var(--fg3); flex-shrink: 0; }

/* Tooltip */
#tooltip {
    position: fixed; display: none; background: var(--bg2);
    border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px;
    font-size: 12px; pointer-events: none; z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2); max-width: 280px;
    line-height: 1.5;
}
#tooltip b { color: var(--fg); }
#tooltip .tt-val { font-weight: 700; color: var(--accent); }
#tooltip .tt-pct { color: var(--fg2); }

/* Hidden tab contents */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Responsive */
@media (max-width: 800px) {
    .chart-container { flex-direction: column; }
    .legend-panel { width: 100%; min-width: 0; max-height: 200px; }
}

function getColor(tab, termId) {
    if (tab === 'themes') return THEME_COLORS[termId] || '#888';
    if (tab === 'periods') return PERIOD_COLORS[termId] || '#888';
    if (tab === 'genres') return GENRE_COLORS[termId] || '#888';
    if (tab === 'figures') {
        const idx = ALL_DATA.figures.items.findIndex(d => d.id === termId);
        return idx >= 0 ? FIGURE_PALETTE[idx % FIGURE_PALETTE.length] : '#888';
    }
    return '#888';
}

function buildLegend(tab) {
    const panel = document.getElementById('legend-' + tab);
    panel.innerHTML = '';
    const data = ALL_DATA[tab];

    // Header
    const header = document.createElement('div');
    header.className = 'legend-header';
    header.textContent = tab === 'themes' ? 'Themes' :
                         tab === 'figures' ? 'Literary Figures' :
                         tab === 'genres' ? 'Genres / Media' : 'Periods';
    panel.appendChild(header);

    // All button
    const allBtn = document.createElement('div');
    allBtn.className = 'legend-all-btn';
    allBtn.innerHTML = '<span style="font-size:14px">&#9632;</span> Show All';
    allBtn.addEventListener('click', () => {
        state[tab].active = null;
        updateLegendDimming(tab);
        render(tab);
    });
    panel.appendChild(allBtn);

    // For figures tab, group by era
    if (tab === 'figures') {
        const itemsById = {};
        data.items.forEach(item => { itemsById[item.id] = item; });

        // Track which items we've placed (to handle any not in FIGURE_ERAS)
        const placed = new Set();

        for (const [era, names] of Object.entries(FIGURE_ERAS)) {
            // Only show era divider if any of its figures are in data
            const eraItems = names.filter(n => itemsById[n]);
            if (eraItems.length === 0) continue;

            const divider = document.createElement('div');
            divider.className = 'legend-divider';
            divider.textContent = era;
            panel.appendChild(divider);

            eraItems.forEach(name => {
                const item = itemsById[name];
                if (!item) return;
                placed.add(name);
                panel.appendChild(makeLegendItem(tab, item));
            });
        }

        // Any remaining (not in FIGURE_ERAS)
        const remaining = data.items.filter(d => !placed.has(d.id));
        if (remaining.length > 0) {
            const divider = document.createElement('div');
            divider.className = 'legend-divider';
            divider.textContent = 'Other';
            panel.appendChild(divider);
            remaining.forEach(item => panel.appendChild(makeLegendItem(tab, item)));
        }
    } else {
        data.items.forEach(item => {
            panel.appendChild(makeLegendItem(tab, item));
        });
    }
}

function makeLegendItem(tab, item) {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.dataset.itemId = item.id;
    const color = getColor(tab, item.id);
    div.innerHTML = `<div class="legend-swatch" style="background:${color}"></div>` +
                    `<span class="legend-label" title="${item.label}">${item.label}</span>` +
                    `<span class="legend-count">${item.total}</span>`;

    div.addEventListener('click', (e) => {
        const st = state[tab];
        const data = ALL_DATA[tab];
        if (e.shiftKey) {
            // Shift-click: add/remove from selection
            if (st.active === null) {
                // Was showing all; now show only this one
                st.active = new Set([item.id]);
            } else if (st.active.has(item.id)) {
                st.active.delete(item.id);
                if (st.active.size === 0) st.active = null;
            } else {
                st.active.add(item.id);
                if (st.active.size === data.items.length) st.active = null;
            }
        } else {
            // Plain click: isolate this one (or reset if already isolated)
            if (st.active !== null && st.active.size === 1 && st.active.has(item.id)) {
                st.active = null;
            } else {
                st.active = new Set([item.id]);
            }
        }
        updateLegendDimming(tab);
        render(tab);
    });
    return div;
}

function updateLegendDimming(tab) {
    const panel = document.getElementById('legend-' + tab);
    panel.querySelectorAll('.legend-item').forEach(el => {
        const id = el.dataset.itemId;
        if (!id) return;
        if (state[tab].active !== null && !state[tab].active.has(id)) {
            el.classList.add('dimmed');
        } else {
            el.classList.remove('dimmed');
        }
    });
}

const tooltip = document.getElementById('tooltip');

function showTooltip(evt, html) {
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    const tx = evt.clientX + 14;
    const ty = evt.clientY + 14;
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    tooltip.style.left = (tx + tw > window.innerWidth ? evt.clientX - tw - 10 : tx) + 'px';
    tooltip.style.top = (ty + th > window.innerHeight ? evt.clientY - th - 10 : ty) + 'px';
}

function hideTooltip() {
    tooltip.style.display = 'none';
}

function render(tab) {
    const st = state[tab];
    const container = document.getElementById('chartArea-' + tab);
    container.innerHTML = '';
    if (st.chart === 'stacked') {
        drawStackedBar(tab, container);
    } else {
        drawBumpChart(tab, container);
    }
}

function cssVar(name) {
    return getComputedStyle(document.body).getPropertyValue(name).trim();
}

// ============================================================
// STACKED BAR CHART
// ============================================================
function drawStackedBar(tab, container) {
    const data = ALL_DATA[tab];
    const st = state[tab];
    const showPct = st.mode === 'pct';
    const activeSet = st.active;

    const { width: W, height: H } = getChartDimensions(tab);
    const plotW = W - MARGIN.left - MARGIN.right;
    const plotH = H - MARGIN.top - MARGIN.bottom;

    const svg = d3.select(container).append('svg')
        .attr('width', W).attr('height', H)
        .attr('xmlns', 'http://www.w3.org/2000/svg');

    const years = data.years;
    const items = data.items;
    const vals = showPct ? data.percentages : data.counts;

    // X scale: band for years
    const x = d3.scaleBand()
        .domain(years)
        .range([MARGIN.left, MARGIN.left + plotW])
        .padding(0.15);

    // Compute stacked data using d3.stack
    const keys = items.map(d => d.id);
    const stackData = years.map((yr, yi) => {
        const row = { year: yr };
        keys.forEach(k => { row[k] = vals[k] ? vals[k][yi] : 0; });
        return row;
    });

    const stack = d3.stack().keys(keys).order(d3.stackOrderNone).offset(d3.stackOffsetNone);
    const series = stack(stackData);

    // Y scale
    const maxY = d3.max(series, s => d3.max(s, d => d[1])) || 1;
    const y = d3.scaleLinear()
        .domain([0, maxY * 1.05])
        .range([MARGIN.top + plotH, MARGIN.top])
        .nice();

    // Grid lines
    const gridG = svg.append('g');
    y.ticks(6).forEach(tick => {
        gridG.append('line')
            .attr('x1', MARGIN.left).attr('x2', MARGIN.left + plotW)
            .attr('y1', y(tick)).attr('y2', y(tick))
            .attr('stroke', cssVar('--grid')).attr('stroke-width', 1);
    });

    // Bars
    const barG = svg.append('g');
    series.forEach((s, si) => {
        const termId = keys[si];
        const isActive = activeSet === null || activeSet.has(termId);
        const color = getColor(tab, termId);

        s.forEach((d, di) => {
            const yr = years[di];
            const barH = y(d[0]) - y(d[1]);
            if (barH < 0.5) return;

            barG.append('rect')
                .attr('x', x(yr))
                .attr('y', y(d[1]))
                .attr('width', x.bandwidth())
                .attr('height', barH)
                .attr('fill', color)
                .attr('opacity', isActive ? 0.85 : 0.08)
                .attr('data-term', termId)
                .attr('data-year', yr)
                .attr('data-count', data.counts[termId] ? data.counts[termId][di] : 0)
                .attr('data-pct', data.percentages[termId] ? data.percentages[termId][di] : 0)
                .on('mousemove', function(evt) {
                    const cnt = +this.getAttribute('data-count');
                    const pct = (+this.getAttribute('data-pct')).toFixed(1);
                    const term = this.getAttribute('data-term');
                    const year = this.getAttribute('data-year');
                    showTooltip(evt,
                        `<b>${term}</b><br>` +
                        `Year: ${year}<br>` +
                        `Count: <span class="tt-val">${cnt}</span><br>` +
                        `<span class="tt-pct">${pct}% of presentations</span>`
                    );
                })
                .on('mouseleave', hideTooltip);
        });
    });

    // X axis
    const xAxisG = svg.append('g')
        .attr('transform', `translate(0,${MARGIN.top + plotH})`);
    const xAxis = d3.axisBottom(x)
        .tickValues(years.filter((yr, i) => i % 2 === 0))
        .tickSize(4);
    xAxisG.call(xAxis)
        .selectAll('text')
        .attr('transform', 'rotate(-45)')
        .attr('text-anchor', 'end')
        .attr('dx', '-4px').attr('dy', '2px')
        .attr('fill', cssVar('--fg2'))
        .style('font-size', '11px');
    xAxisG.select('.domain').attr('stroke', cssVar('--border'));
    xAxisG.selectAll('.tick line').attr('stroke', cssVar('--border'));

    // Y axis
    const yAxisG = svg.append('g')
        .attr('transform', `translate(${MARGIN.left},0)`);
    const yAxis = d3.axisLeft(y).ticks(6)
        .tickFormat(d => showPct ? d.toFixed(0) + '%' : d.toFixed(0));
    yAxisG.call(yAxis)
        .selectAll('text')
        .attr('fill', cssVar('--fg2'))
        .style('font-size', '11px');
    yAxisG.select('.domain').attr('stroke', cssVar('--border'));
    yAxisG.selectAll('.tick line').attr('stroke', cssVar('--border'));

    // Y axis label
    svg.append('text')
        .attr('transform', `rotate(-90)`)
        .attr('x', -(MARGIN.top + plotH / 2))
        .attr('y', 14)
        .attr('text-anchor', 'middle')
        .attr('fill', cssVar('--fg3'))
        .style('font-size', '11px')
        .text(showPct ? '% of Presentations' : 'Count');

    // Title
    svg.append('text')
        .attr('x', MARGIN.left)
        .attr('y', 20)
        .attr('fill', cssVar('--fg2'))
        .style('font-size', '12px')
        .text(showPct ? 'Percentage of presentations per year (topics may overlap)' :
                        'Topic mentions per year (presentations may have multiple topics)');
}

// ============================================================
// BUMP CHART
// ============================================================
function drawBumpChart(tab, container) {
    const data = ALL_DATA[tab];
    const st = state[tab];
    const activeSet = st.active;
    const showPct = st.mode === 'pct';

    const { width: W, height: H } = getChartDimensions(tab);
    const rightLabel = 140;
    const plotW = W - MARGIN.left - MARGIN.right - rightLabel;
    const plotH = H - MARGIN.top - MARGIN.bottom;

    // Filter to terms appearing in >= 3 years
    const items = data.items.filter(d => (data.yearsPresent[d.id] || 0) >= 3);
    const nItems = items.length;
    if (nItems === 0) return;

    const years = data.years;

    const svg = d3.select(container).append('svg')
        .attr('width', W).attr('height', H)
        .attr('xmlns', 'http://www.w3.org/2000/svg');

    // X scale
    const x = d3.scalePoint()
        .domain(years)
        .range([MARGIN.left, MARGIN.left + plotW])
        .padding(0.3);

    // Y scale: rank 0 at top, nItems-1 at bottom
    const y = d3.scaleLinear()
        .domain([0, nItems - 1])
        .range([MARGIN.top + 10, MARGIN.top + plotH - 10]);

    // Grid lines
    const gridG = svg.append('g');
    for (let r = 0; r < nItems; r++) {
        gridG.append('line')
            .attr('x1', MARGIN.left).attr('x2', MARGIN.left + plotW)
            .attr('y1', y(r)).attr('y2', y(r))
            .attr('stroke', cssVar('--grid')).attr('stroke-width', 0.5);
    }

    // Compute ranks among filtered items only, per year
    const itemRanks = {};  // termId -> [rank per year or null]
    items.forEach(d => { itemRanks[d.id] = []; });

    years.forEach((yr, yi) => {
        const yearVals = items.map(d => ({
            id: d.id,
            count: showPct
                ? (data.percentages[d.id] ? data.percentages[d.id][yi] : 0)
                : (data.counts[d.id] ? data.counts[d.id][yi] : 0)
        }));
        yearVals.sort((a, b) => b.count - a.count || a.id.localeCompare(b.id));
        yearVals.forEach((v, rank) => {
            itemRanks[v.id][yi] = v.count > 0 ? rank : null;
        });
    });

    // Draw lines and dots
    const line = d3.line()
        .defined(d => d[1] !== null)
        .x(d => x(d[0]))
        .y(d => y(d[1]))
        .curve(d3.curveMonotoneX);

    items.forEach((item) => {
        const termId = item.id;
        const isActive = activeSet === null || activeSet.has(termId);
        const color = getColor(tab, termId);
        const lineData = years.map((yr, yi) => [yr, itemRanks[termId][yi]]);

        // Invisible wider overlay for easier clicking
        svg.append('path')
            .datum(lineData.filter(d => d[1] !== null))
            .attr('d', line)
            .attr('fill', 'none')
            .attr('stroke', 'transparent')
            .attr('stroke-width', 14)
            .attr('cursor', 'pointer')
            .attr('data-term', termId)
            .on('click', () => {
                const st2 = state[tab];
                if (st2.active !== null && st2.active.size === 1 && st2.active.has(termId)) {
                    st2.active = null;
                } else {
                    st2.active = new Set([termId]);
                }
                updateLegendDimming(tab);
                render(tab);
            });

        // Path
        svg.append('path')
            .datum(lineData.filter(d => d[1] !== null))
            .attr('d', line)
            .attr('fill', 'none')
            .attr('stroke', color)
            .attr('stroke-width', isActive && activeSet !== null ? 3 : 1.5)
            .attr('opacity', isActive ? 0.85 : 0.07)
            .attr('pointer-events', 'none');

        // Dots
        lineData.forEach(([yr, rank]) => {
            if (rank === null) return;
            const yi = years.indexOf(yr);
            const cnt = data.counts[termId] ? data.counts[termId][yi] : 0;
            const pct = data.percentages[termId] ? data.percentages[termId][yi] : 0;

            svg.append('circle')
                .attr('cx', x(yr))
                .attr('cy', y(rank))
                .attr('r', isActive && activeSet !== null ? 4.5 : 2.5)
                .attr('fill', color)
                .attr('opacity', isActive ? 0.9 : 0.08)
                .on('mousemove', (evt) => {
                    showTooltip(evt,
                        `<b>${termId}</b><br>` +
                        `Year: ${yr}<br>` +
                        `Rank: <span class="tt-val">#${rank + 1}</span><br>` +
                        `Count: ${cnt} <span class="tt-pct">(${pct.toFixed(1)}%)</span>`
                    );
                })
                .on('mouseleave', hideTooltip);
        });

        // End label (last non-null rank)
        const lastValid = lineData.filter(d => d[1] !== null);
        if (lastValid.length > 0) {
            const [lastYr, lastRank] = lastValid[lastValid.length - 1];
            const isSelected = activeSet !== null && activeSet.has(termId);
            svg.append('text')
                .attr('x', MARGIN.left + plotW + 8)
                .attr('y', y(lastRank) + 4)
                .attr('fill', color)
                .attr('opacity', isActive ? 0.9 : 0.1)
                .style('font-size', isSelected ? '12px' : (isActive && activeSet !== null ? '11px' : '10px'))
                .style('font-weight', isSelected ? '800' : (isActive && activeSet !== null ? '700' : '400'))
                .text(item.label.length > 18 ? item.label.substring(0, 18) + '...' : item.label);
        }
    });

    // X axis
    const xAxisG = svg.append('g')
        .attr('transform', `translate(0,${MARGIN.top + plotH})`);
    const xAxis = d3.axisBottom(x)
        .tickValues(years.filter((yr, i) => i % 2 === 0))
        .tickSize(4);
    xAxisG.call(xAxis)
        .selectAll('text')
        .attr('transform', 'rotate(-45)')
        .attr('text-anchor', 'end')
        .attr('dx', '-4px').attr('dy', '2px')
        .attr('fill', cssVar('--fg2'))
        .style('font-size', '11px');
    xAxisG.select('.domain').attr('stroke', cssVar('--border'));
    xAxisG.selectAll('.tick line').attr('stroke', cssVar('--border'));

    // Y axis labels
    svg.append('text')
        .attr('x', MARGIN.left - 8)
        .attr('y', y(0) + 4)
        .attr('text-anchor', 'end')
        .attr('fill', cssVar('--fg3'))
        .style('font-size', '10px')
        .text('#1');

    if (nItems > 2) {
        const mid = Math.floor(nItems / 2);
        svg.append('text')
            .attr('x', MARGIN.left - 8)
            .attr('y', y(mid) + 4)
            .attr('text-anchor', 'end')
            .attr('fill', cssVar('--fg3'))
            .style('font-size', '10px')
            .text('#' + (mid + 1));
    }

    svg.append('text')
        .attr('x', MARGIN.left - 8)
        .attr('y', y(nItems - 1) + 4)
        .attr('text-anchor', 'end')
        .attr('fill', cssVar('--fg3'))
        .style('font-size', '10px')
        .text('#' + nItems);

    // Title
    svg.append('text')
        .attr('x', MARGIN.left)
        .attr('y', 20)
        .attr('fill', cssVar('--fg2'))
        .style('font-size', '12px')
        .text('Rank trajectory over time (terms appearing in 3+ years)');
}

// ============================================================
// EXPORT: PNG
// ============================================================
document.getElementById('exportPngBtn').addEventListener('click', () => {
    const svgEl = document.querySelector('#chartArea-' + activeTab + ' svg');
    if (!svgEl) return;
    const serializer = new XMLSerializer();
    const svgStr = serializer.serializeToString(svgEl);
    const canvas = document.createElement('canvas');
    const w = +svgEl.getAttribute('width');
    const h = +svgEl.getAttribute('height');
    canvas.width = w * 2;
    canvas.height = h * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);

    // Fill background
    ctx.fillStyle = cssVar('--bg');
    ctx.fillRect(0, 0, w, h);

    const img = new Image();
    const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
        ctx.drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        const link = document.createElement('a');
        link.download = `ajls_${activeTab}_${state[activeTab].chart}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
    img.src = url;
});

// ============================================================
// EXPORT: CSV
// ============================================================
document.getElementById('exportCsvBtn').addEventListener('click', () => {
    const data = ALL_DATA[activeTab];
    const years = data.years;
    const items = data.items;

    let csvContent = 'term,total,' + years.join(',') + '\n';
    items.forEach(item => {
        const counts = data.counts[item.id] || [];
        csvContent += '"' + item.label.replace(/"/g, '""') + '",' + item.total + ',' +
                      counts.join(',') + '\n';
    });

    // Totals row
    csvContent += '"TOTAL_PRESENTATIONS",,' + data.totals.join(',') + '\n';

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = `ajls_${activeTab}_data.csv`;
    link.href = url;
    link.click();
    URL.revokeObjectURL(url);
});

// ============================================================
// INIT
// ============================================================
['themes', 'figures', 'genres', 'periods'].forEach(tab => {
    buildLegend(tab);
});

// Render default tab
render('themes');

// Resize handler
window.addEventListener('resize', () => render(activeTab));
</script>
