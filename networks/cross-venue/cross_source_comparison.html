        // State
        let currentTerm = allTerms[0];
        let compareTerm = '';
        // FIX: data uses 'job_ad' not 'job'
        let visibleSources = new Set(['journal', 'dissertation', 'job_ad']);

        const sourceLabels = { 'journal': 'Journals', 'dissertation': 'Dissertations', 'job_ad': 'Job Ads' };
        const srcAbbr      = { 'journal': 'J.',       'dissertation': 'D.',            'job_ad': 'A.'       };

        // Tooltip
        const tooltip = d3.select('body').append('div').attr('class', 'tooltip').style('opacity', 0);

        // Populate term selectors
        const termSelect    = document.getElementById('term-select');
        const compareSelect = document.getElementById('compare-select');
        allTerms.forEach(term => {
            [termSelect, compareSelect].forEach(sel => {
                const o = document.createElement('option');
                o.value = term; o.textContent = term;
                sel.appendChild(o);
            });
        });

        // Theme toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            document.body.classList.toggle('dark-mode');
            document.getElementById('theme-toggle').textContent =
                document.body.classList.contains('light-mode') ? '🌙 Dark Mode' : '☀️ Light Mode';
            render();
        });

        // Control listeners
        termSelect.addEventListener('change',    (e) => { currentTerm = e.target.value; render(); });
        compareSelect.addEventListener('change', (e) => { compareTerm = e.target.value; render(); });
        document.getElementById('show-journal').addEventListener('change', (e) => {
            if (e.target.checked) visibleSources.add('journal'); else visibleSources.delete('journal'); render();
        });
        document.getElementById('show-dissertation').addEventListener('change', (e) => {
            if (e.target.checked) visibleSources.add('dissertation'); else visibleSources.delete('dissertation'); render();
        });
        document.getElementById('show-job').addEventListener('change', (e) => {
            if (e.target.checked) visibleSources.add('job_ad'); else visibleSources.delete('job_ad'); render();
        });

        // Color scales
        // FIX: domain now includes 'job_ad', not 'job'
        const colorScale   = d3.scaleOrdinal().domain(['journal','dissertation','job_ad']).range(['#2196F3','#FF9800','#E91E63']);
        const compareColors = ['#5B8DEF', '#E07B39'];

        function getInnerW(id) {
            const el = document.getElementById(id);
            return el ? Math.max(300, el.parentElement.clientWidth - 42) : 480;
        }

        function render() {
            renderBarChart();
            renderRadarChart();
            renderLineChart();
        }

        // ── Bar Chart ──────────────────────────────────────────────────────────
        function renderBarChart() {
            const container = d3.select('#bar-chart');
            container.html('');

            const terms   = compareTerm ? [currentTerm, compareTerm] : [currentTerm];
            const sources = Array.from(visibleSources);
            if (sources.length === 0) { container.append('p').style('color','var(--fg)').text('No sources selected'); return; }

            const width  = Math.min(getInnerW('bar-chart'), 560);
            const height = 280;
            const margin = {top: 20, right: 20, bottom: 50, left: 68};
            const iW = width - margin.left - margin.right;
            const iH = height - margin.top - margin.bottom;

            const svg = container.append('svg').attr('width', width).attr('height', height);
            const g   = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

            // Outer = sources, inner = terms (grouped bars)
            const xSrc  = d3.scaleBand().domain(sources).range([0, iW]).padding(0.25);
            const xTerm = d3.scaleBand().domain(terms).range([0, xSrc.bandwidth()]).padding(0.05);

            let maxVal = 0;
            terms.forEach(t => sources.forEach(s => {
                const d = data.find(x => x.term === t && x.source === s);
                if (d) maxVal = Math.max(maxVal, d.value);
            }));
            const yScale = d3.scaleLinear().domain([0, maxVal * 1.2 || 0.01]).range([iH, 0]);
            const tColor = d3.scaleOrdinal().domain(terms).range(compareColors);

            // Y grid
            g.selectAll('.ygrid').data(yScale.ticks(5)).join('line')
                .attr('x1', 0).attr('x2', iW)
                .attr('y1', d => yScale(d)).attr('y2', d => yScale(d))
                .style('stroke','var(--border)').style('stroke-opacity',0.3).style('stroke-dasharray','3,3');

            // Bars
            terms.forEach(term => {
                sources.forEach(src => {
                    const d = data.find(x => x.term === term && x.source === src);
                    if (!d) return;
                    const bx = xSrc(src) + xTerm(term);
                    const by = yScale(d.value);
                    const bh = iH - by;
                    const col = terms.length > 1 ? tColor(term) : colorScale(src);
                    g.append('rect').attr('x', bx).attr('y', by)
                        .attr('width', xTerm.bandwidth()).attr('height', bh)
                        .attr('fill', col).attr('rx', 2).attr('opacity', 0.85)
                        .on('mouseover', (ev) => tooltip.style('opacity', 1)
                            .html(`<strong>${term}</strong><br>${sourceLabels[src]}: <strong>${d3.format('.2%')(d.value)}</strong><br><span style="opacity:.7">${d.count} docs</span>`))
                        .on('mousemove', (ev) => tooltip.style('left',(ev.pageX+14)+'px').style('top',(ev.pageY-34)+'px'))
                        .on('mouseleave', () => tooltip.style('opacity', 0));
                    if (bh > 14) g.append('text')
                        .attr('x', bx + xTerm.bandwidth()/2).attr('y', by - 3)
                        .attr('text-anchor','middle').style('font-size','10px').style('fill','var(--fg)')
                        .text(d3.format('.1%')(d.value));
                });
            });

            g.append('g').attr('class','axis').attr('transform',`translate(0,${iH})`)
                .call(d3.axisBottom(xSrc).tickFormat(s => sourceLabels[s] || s));
            g.append('g').attr('class','axis')
                .call(d3.axisLeft(yScale).ticks(5).tickFormat(d3.format('.1%')));

            // Legend (compare mode only)
            if (terms.length > 1) {
                const lg = g.append('g').attr('transform', `translate(${iW - 130}, 4)`);
                terms.forEach((t, i) => {
                    lg.append('rect').attr('x',0).attr('y',i*16).attr('width',10).attr('height',10).attr('fill',tColor(t)).attr('rx',2);
                    lg.append('text').attr('x',14).attr('y',i*16+9).style('font-size','10px').style('fill','var(--fg)').text(t);
                });
            }
        }

        // ── Radar Chart ────────────────────────────────────────────────────────
        function renderRadarChart() {
            const container = d3.select('#radar-chart');
            container.html('');

            const sources    = Array.from(visibleSources);
            if (sources.length === 0) { container.append('p').style('color','var(--fg)').text('Select at least one source'); return; }

            // First 8 terms as axes; normalize each term's max to 1 so shape is meaningful
            const rTerms = allTerms.slice(0, Math.min(8, allTerms.length));
            const maxPer = {};
            rTerms.forEach(t => {
                let mv = 0;
                sources.forEach(s => { const d = data.find(x => x.source===s && x.term===t); if (d) mv = Math.max(mv, d.value); });
                maxPer[t] = mv || 1;
            });
            const rData = sources.map(src => ({
                source: src,
                axes: rTerms.map(t => {
                    const d = data.find(x => x.source===src && x.term===t);
                    return { axis: t, value: d ? d.value/maxPer[t] : 0, raw: d ? d.value : 0 };
                })
            }));

            const width  = Math.min(getInnerW('radar-chart'), 500);
            const height = 280;
            const radius = Math.min(width, height)/2 - 52;
            const svg = container.append('svg').attr('width', width).attr('height', height);
            const g   = svg.append('g').attr('transform', `translate(${width/2},${height/2})`);

            const angleScale  = d3.scaleLinear().domain([0, rTerms.length]).range([0, 2*Math.PI]);
            const radiusScale = d3.scaleLinear().domain([0, 1]).range([0, radius]);

            [0.25, 0.5, 0.75, 1].forEach(f =>
                g.append('circle').attr('r', radius*f).style('fill','none').style('stroke','var(--border)').style('stroke-opacity',0.3));

            rTerms.forEach((term, i) => {
                const ang = angleScale(i) - Math.PI/2;
                const x = Math.cos(ang)*radius, y = Math.sin(ang)*radius;
                g.append('line').attr('x1',0).attr('y1',0).attr('x2',x).attr('y2',y)
                    .style('stroke','var(--border)').style('stroke-opacity',0.3);
                const hilite = term===currentTerm || term===compareTerm;
                g.append('text')
                    .attr('x', x*1.2).attr('y', y*1.2).attr('dy','0.35em')
                    .attr('text-anchor', Math.cos(ang)>0.1 ? 'start' : Math.cos(ang)<-0.1 ? 'end' : 'middle')
                    .style('font-size', hilite ? '12px' : '10px')
                    .style('font-weight', hilite ? 'bold' : 'normal')
                    .style('fill', hilite ? 'var(--accent)' : 'var(--fg)')
                    .text(term);
            });

            const lineGen = d3.line().x(d => d.x).y(d => d.y).curve(d3.curveLinearClosed);
            rData.forEach(d => {
                const pts = d.axes.map((a, i) => {
                    const ang = angleScale(i) - Math.PI/2;
                    const r   = radiusScale(a.value);
                    return { x: Math.cos(ang)*r, y: Math.sin(ang)*r };
                });
                g.append('path').datum(pts).attr('d', lineGen)
                    .style('fill', colorScale(d.source)).style('fill-opacity', 0.15)
                    .style('stroke', colorScale(d.source)).style('stroke-width', 2)
                    .on('mouseover', (ev) => tooltip.style('opacity',1)
                        .html(`<strong>${sourceLabels[d.source]}</strong><br>` +
                            rTerms.map((t,i) => `${t}: ${d3.format('.1%')(d.axes[i].raw)}`).join('<br>')))
                    .on('mousemove', (ev) => tooltip.style('left',(ev.pageX+14)+'px').style('top',(ev.pageY-34)+'px'))
                    .on('mouseleave', () => tooltip.style('opacity', 0));
            });

            // Legend
            const lg = g.append('g').attr('transform', `translate(${-radius-8}, ${radius - sources.length*16})`);
            sources.forEach((s, i) => {
                lg.append('rect').attr('x',0).attr('y',i*16).attr('width',10).attr('height',10).attr('fill',colorScale(s)).attr('rx',2);
                lg.append('text').attr('x',14).attr('y',i*16+9).style('font-size','10px').style('fill','var(--fg)').text(sourceLabels[s]||s);
            });
        }

        // ── Trend Line Chart ───────────────────────────────────────────────────
        function renderLineChart() {
            const container = d3.select('#line-chart');
            container.html('');

            const terms   = compareTerm ? [currentTerm, compareTerm] : [currentTerm];
            const sources = Array.from(visibleSources);

            // Build series
            const series = [];
            terms.forEach(term => {
                const ts = timeSeries[term];
                if (!ts) return;
                sources.forEach(src => {
                    const st = ts[src];
                    if (!st || !st.years || st.years.length === 0) return;
                    series.push({ source: src, term, data: st.years.map((y, i) => ({ year: y, value: st.values[i] })) });
                });
            });

            if (series.length === 0) {
                container.append('p').style('color','var(--fg)').text('No trend data for selected term / sources');
                return;
            }

            const contW = document.getElementById('line-chart').parentElement.clientWidth - 42;
            const width  = Math.min(contW, 800);
            const height = 220;
            const margin = {top: 16, right: 135, bottom: 40, left: 68};
            const iW = width - margin.left - margin.right;
            const iH = height - margin.top - margin.bottom;

            const svg = container.append('svg').attr('width', width).attr('height', height);
            const g   = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

            const allYears = series.flatMap(s => s.data.map(d => d.year));
            const allVals  = series.flatMap(s => s.data.map(d => d.value));
            const xScale   = d3.scaleLinear().domain(d3.extent(allYears)).range([0, iW]);
            const yScale   = d3.scaleLinear().domain([0, d3.max(allVals)*1.2 || 0.01]).range([iH, 0]);

            const tColor = d3.scaleOrdinal().domain(terms).range(compareColors);
            const dashes = ['none', '6,3', '2,4'];

            // Y grid
            g.selectAll('.ygrid').data(yScale.ticks(4)).join('line')
                .attr('x1',0).attr('x2',iW)
                .attr('y1', d => yScale(d)).attr('y2', d => yScale(d))
                .style('stroke','var(--border)').style('stroke-opacity',0.25).style('stroke-dasharray','3,3');

            const lineGen = d3.line().x(d => xScale(d.year)).y(d => yScale(d.value)).curve(d3.curveMonotoneX);

            series.forEach((s, si) => {
                const color = terms.length > 1 ? tColor(s.term) : colorScale(s.source);
                const dash  = terms.length > 1
                    ? dashes[terms.indexOf(s.term) % dashes.length]
                    : dashes[sources.indexOf(s.source) % dashes.length];

                g.append('path').datum(s.data).attr('d', lineGen)
                    .style('fill','none').style('stroke',color)
                    .style('stroke-width',2.2).style('stroke-dasharray',dash).style('opacity',0.85);

                g.selectAll(null).data(s.data).join('circle')
                    .attr('cx', d => xScale(d.year)).attr('cy', d => yScale(d.value))
                    .attr('r', 4).attr('fill', color).attr('stroke','var(--bg)').attr('stroke-width',1.5)
                    .style('cursor','pointer')
                    .on('mouseover', (ev, d) => tooltip.style('opacity',1)
                        .html(`<strong>${s.term}</strong> — ${sourceLabels[s.source]}<br>${d.year}: <strong>${d3.format('.2%')(d.value)}</strong>`))
                    .on('mousemove', (ev) => tooltip.style('left',(ev.pageX+14)+'px').style('top',(ev.pageY-34)+'px'))
                    .on('mouseleave', () => tooltip.style('opacity', 0));
            });

            g.append('g').attr('class','axis').attr('transform',`translate(0,${iH})`)
                .call(d3.axisBottom(xScale).ticks(8).tickFormat(d3.format('d')));
            g.append('g').attr('class','axis')
                .call(d3.axisLeft(yScale).ticks(4).tickFormat(d3.format('.1%')));

            svg.append('text').attr('transform','rotate(-90)')
                .attr('x', -(margin.top + iH/2)).attr('y', 16)
                .attr('text-anchor','middle').style('font-size','10px').style('fill','var(--fg)').style('opacity',0.6)
                .text('% of documents');

            // Legend
            const lgG = g.append('g').attr('transform', `translate(${iW+8}, 0)`);
            series.forEach((s, i) => {
                const color = terms.length > 1 ? tColor(s.term) : colorScale(s.source);
                const dash  = terms.length > 1
                    ? dashes[terms.indexOf(s.term) % dashes.length]
                    : dashes[sources.indexOf(s.source) % dashes.length];
                const label = terms.length > 1
                    ? `${s.term} (${srcAbbr[s.source]||s.source})`
                    : (sourceLabels[s.source]||s.source);
                lgG.append('line').attr('x1',0).attr('y1',i*18+5).attr('x2',20).attr('y2',i*18+5)
                    .style('stroke',color).style('stroke-width',2).style('stroke-dasharray',dash);
                lgG.append('text').attr('x',24).attr('y',i*18+9)
                    .style('font-size','10px').style('fill','var(--fg)').text(label);
            });
        }

        // Initial render
        render();
    </script>
</body>
</html>
