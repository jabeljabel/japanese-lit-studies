            // Generate color

                const dy = found.y - my;

                if (dist <= found.radius) {

                </div>

                <div class="sidebar-section">
                    <h3>Connection Counts</h3>
                    ${Object.entries(node.edge_counts || {}).map(([type, count]) =>
                        `<p><strong>${type}:</strong> ${count}</p>`
                    ).join('')}
                </div>
            `;

            sidebar.classList.add('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            selectedNode = null;
            render();
        }

        // Controls
        document.getElementById('color-by').addEventListener('change', () => {
            updateLegend();
            render();
        });

        document.getElementById('min-degree').addEventListener('input', (e) => {
            document.getElementById('degree-value').textContent = e.target.value;
            render();
        });

        // Search
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) return;

            const matches = nodes.filter(n =>
                n.name.toLowerCase().includes(query)
            );

            if (matches.length > 0) {
                const node = matches[0];

                // Zoom to node
                const scale = 2;
                const tx = canvas.width / 2 - node.x * scale;
                const ty = canvas.height / 2 - node.y * scale;

                d3.select(canvas)
                    .transition()
                    .duration(750)
                    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));

                selectedNode = node;
                showSidebar(node);
            }
        });

        // Edge type controls
        function initEdgeTypeControls() {
            const container = document.getElementById('edge-type-controls');
            container.innerHTML = '';

            edgeTypes.forEach(type => {
                const div = document.createElement('div');
                div.className = 'checkbox-item';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = `edge-${type}`;
                checkbox.value = type;
                checkbox.checked = true;
                checkbox.addEventListener('change', render);

                const label = document.createElement('label');
                label.htmlFor = `edge-${type}`;
                label.textContent = type;

                div.appendChild(checkbox);
                div.appendChild(label);
                container.appendChild(div);
            });
        }

        // Legend
        function updateLegend() {
            const colorBy = document.getElementById('color-by').value;
            const container = document.getElementById('legend-items');
            container.innerHTML = '';

            let items = [];

            if (colorBy === 'conference') {
                items = conferences.map(c => ({
                    label: c.toUpperCase(),
                    color: isDarkMode ? CONFERENCE_COLORS_DARK[c] : CONFERENCE_COLORS[c]
                }));
            } else if (colorBy === 'generation') {
                items = Object.entries(GENERATION_COLORS).map(([gen, color]) => ({
                    label: gen,
                    color: color
                }));
            } else if (colorBy === 'institution') {
                // Show top 5 institutions
                const instCounts = {};
                nodes.forEach(n => {
                    if (n.institution) {
                        instCounts[n.institution] = (instCounts[n.institution] || 0) + 1;
                    }
                });

                const top = Object.entries(instCounts)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 5);

                items = top.map(([inst, count]) => ({
                    label: `${inst} (${count})`,
                    color: getInstitutionColor(inst, isDarkMode)
                }));
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'legend-item';

                const colorBox = document.createElement('div');
                colorBox.className = 'legend-color';
                colorBox.style.backgroundColor = item.color;

                const label = document.createElement('span');
                label.textContent = item.label;

                div.appendChild(colorBox);
                div.appendChild(label);
                container.appendChild(div);
            });
        }

        // Dark mode toggle
        document.getElementById('mode-toggle').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            document.getElementById('mode-toggle').textContent = isDarkMode ? '☀️' : '🌙';
            updateLegend();
            render();
        });

        // Export PNG
        document.getElementById('export-png').addEventListener('click', () => {
            // Create a temporary canvas with white background
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const exportCtx = exportCanvas.getContext('2d');

            // Fill background
            exportCtx.fillStyle = isDarkMode ? '#1a1a1a' : '#ffffff';
            exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

            // Draw main canvas
            exportCtx.drawImage(canvas, 0, 0);

            // Download
            exportCanvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'field_connections_map.png';
                a.click();
                URL.revokeObjectURL(url);
            });
        });

        // Export CSV
        document.getElementById('export-csv').addEventListener('click', () => {
            const minDegree = parseInt(document.getElementById('min-degree').value);
            const visibleNodes = nodes.filter(n => n.degree >= minDegree);

            const header = 'id,name,institution,generation,phd_year,degree,primary_conference,conferences\n';
            const rows = visibleNodes.map(n => {
                const confs = n.conferences ? n.conferences.join(';') : '';
                return `"${n.id}","${n.name}","${n.institution || ''}","${n.generation || ''}","${n.phd_year || ''}","${n.degree}","${n.primary_conference || ''}","${confs}"`;
            }).join('\n');

            const csv = header + rows;
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'field_connections_nodes.csv';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Initialize
        initData();
        createSimulation();
        initEdgeTypeControls();
        updateLegend();

        console.log('Visualization initialized');
        console.log(`Conference anchors:`, getConferenceAnchors());
    </script>
</body>
</html>
