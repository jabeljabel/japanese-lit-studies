let darkMode = true;
let currentMode = 1;
let minFlowVal = 1;
let selectedSankeyNode = null;
const tooltip = document.getElementById('tooltip');
const container = document.getElementById('container');

function getColors() {
  const cs = getComputedStyle(document.body);
  return {
    bg: cs.getPropertyValue('--bg').trim(),
    fg: cs.getPropertyValue('--fg').trim(),
    fg2: cs.getPropertyValue('--fg2').trim(),
    border: cs.getPropertyValue('--border').trim(),
  };
}

function getDims() {
  const tbH = document.getElementById('toolbar').offsetHeight;
  return { w: window.innerWidth, h: window.innerHeight - tbH };
}

const MODE_SUBTITLES = {
  3: 'Institutional Flow: left = PhD-granting institution → right = current employer. Flow width = number of scholars trained at left institution now working at right.'
};
function setMode(m) {
  currentMode = m;
  for (let i = 1; i <= 4; i++) document.getElementById('btn'+i).classList.toggle('active', i===m);
  const sub = document.getElementById('mode-subtitle');
  if (MODE_SUBTITLES[m]) { sub.textContent = MODE_SUBTITLES[m]; sub.style.display = 'block'; }
  else { sub.style.display = 'none'; }
  renderCurrent();
}

function renderCurrent() {
  container.innerHTML = '';
  const tbH = document.getElementById('toolbar').offsetHeight;
  if (currentMode === 4) {
    container.style.height = (window.innerHeight - tbH) + 'px';
    container.style.overflowY = 'auto';
  } else {
    container.style.height = '';
    container.style.overflowY = 'hidden';
  }
  if (currentMode === 1) renderSankey(D.mode1, 'gen');
  else if (currentMode === 2) renderSankey(D.mode2, 'adv');
  else if (currentMode === 3) renderSankey(D.mode3, 'inst');
  else renderEvolution();
}

function renderSankey(data, type) {
  selectedSankeyNode = null;
  const dim = getDims();
  const C = getColors();
  const M = {top: 30, right: 140, bottom: 30, left: 140};
  const w = dim.w - M.left - M.right;
  const h = dim.h - M.top - M.bottom;

  const svg = d3.select('#container').append('svg')
    .attr('width', dim.w).attr('height', dim.h);
  const g = svg.append('g').attr('transform', `translate(${M.left},${M.top})`);

  // Filter links by min flow
  let links = data.links.filter(l => l.value >= minFlowVal);
  const activeNodes = new Set();
  links.forEach(l => { activeNodes.add(l.source); activeNodes.add(l.target); });

  // Determine columns
  let columns;
  if (type === 'gen') {
    // Group by generation
    const genGroups = {};
    data.nodes.forEach((n, i) => {
      if (!activeNodes.has(i)) return;
      const col = n.gen !== undefined ? n.gen : n.col;
      if (!genGroups[col]) genGroups[col] = [];
      genGroups[col].push(i);
    });
    columns = Object.keys(genGroups).sort((a,b)=>a-b).map(k => genGroups[k]);
  } else {
    // Two-column layout
    const cols = [[], []];
    data.nodes.forEach((n, i) => {
      if (!activeNodes.has(i)) return;
      cols[n.col || 0].push(i);
    });
    columns = cols;
  }

  const numCols = columns.length;
  const colWidth = w / Math.max(numCols, 1);
  const nodeWidth = 16;
  const nodePad = 4;

  // Compute node values (sum of link values)
  const nodeValues = new Array(data.nodes.length).fill(0);
  links.forEach(l => {
    nodeValues[l.source] = Math.max(nodeValues[l.source], (nodeValues[l.source] || 0));
    nodeValues[l.target] = Math.max(nodeValues[l.target], (nodeValues[l.target] || 0));
  });
  // Use data values
  data.nodes.forEach((n, i) => { nodeValues[i] = n.value || 0; });

  // Position nodes
  const nodePos = {};
  columns.forEach((col, ci) => {
    // Sort by value descending
    col.sort((a, b) => (nodeValues[b] || 0) - (nodeValues[a] || 0));
    const totalVal = col.reduce((s, idx) => s + (nodeValues[idx] || 1), 0);
    const scale = Math.min(1, (h - col.length * nodePad) / Math.max(totalVal, 1));
    let y = 0;
    col.forEach(idx => {
      const val = nodeValues[idx] || 1;
      const nodeH = Math.max(4, val * scale);
      nodePos[idx] = {
        x: ci * colWidth,
        y: y,
        w: nodeWidth,
        h: nodeH,
      };
      y += nodeH + nodePad;
    });
    // Center vertically
    const totalH = y - nodePad;
    const offset = Math.max(0, (h - totalH) / 2);
    col.forEach(idx => { nodePos[idx].y += offset; });
  });

  // Compute link positions
  const srcOffsets = {};
  const tgtOffsets = {};
  data.nodes.forEach((_, i) => { srcOffsets[i] = 0; tgtOffsets[i] = 0; });

  // Sort links by source position then target
  links.sort((a, b) => {
    const pa = nodePos[a.source], pb = nodePos[b.source];
    if (!pa || !pb) return 0;
    return pa.y - pb.y || (nodePos[a.target]?.y||0) - (nodePos[b.target]?.y||0);
  });

  const linkPaths = links.map(l => {
    const sp = nodePos[l.source], tp = nodePos[l.target];
    if (!sp || !tp) return null;
    const sScale = sp.h / Math.max(nodeValues[l.source] || 1, 1);
    const tScale = tp.h / Math.max(nodeValues[l.target] || 1, 1);
    const lh = Math.max(1, l.value * Math.min(sScale, tScale));

    const sy = sp.y + srcOffsets[l.source];
    const ty = tp.y + tgtOffsets[l.target];
    srcOffsets[l.source] += lh;
    tgtOffsets[l.target] += lh;

    const x0 = sp.x + nodeWidth;
    const x1 = tp.x;
    let linkColor;
    if (l.topic && TOPIC_COLORS[l.topic]) {
      linkColor = TOPIC_COLORS[l.topic];
    } else if (type === 'inst' && data.instNames) {
      const srcLabel = data.nodes[l.source]?.label || '';
      const srcIdx = data.instNames.indexOf(srcLabel);
      linkColor = srcIdx >= 0 ? INST_COLORS[srcIdx % INST_COLORS.length] : '#888';
    } else {
      linkColor = INST_COLORS[l.source % INST_COLORS.length] || '#888';
    }

    return {
      ...l, x0, y0: sy, x1, y1: ty, lh,
      color: linkColor
    };
  }).filter(Boolean);

  // Draw links
  g.selectAll('.sankey-link').data(linkPaths).join('path')
    .attr('class', 'sankey-link')
    .attr('d', d => {
      const mx = (d.x0 + d.x1) / 2;
      return `M${d.x0},${d.y0} C${mx},${d.y0} ${mx},${d.y1} ${d.x1},${d.y1}`
        + ` v${d.lh}`
        + ` C${mx},${d.y1+d.lh} ${mx},${d.y0+d.lh} ${d.x0},${d.y0+d.lh} Z`;
    })
    .style('fill', d => d.color)
    .on('mousemove', (e, d) => {
      const sn = data.nodes[d.source], tn = data.nodes[d.target];
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX+12)+'px';
      tooltip.style.top = (e.clientY+12)+'px';
      tooltip.innerHTML = `<b>${sn.label}</b> → <b>${tn.label}</b><br>Flow: ${d.value}`;
    })
    .on('mouseleave', () => { tooltip.style.display = 'none'; });

  // Draw nodes
  const nodeGroups = g.selectAll('.sankey-node')
    .data(Object.entries(nodePos).map(([idx, pos]) => ({...pos, idx: +idx, node: data.nodes[+idx]})))
    .join('g').attr('class', 'sankey-node')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  // Build instColorMap for consistent institution coloring
  let instColorMap = {};
  if (type === 'inst' && D.mode3.instNames) {
    D.mode3.instNames.forEach((name, i) => {
      instColorMap[name] = INST_COLORS[i % INST_COLORS.length];
    });
  }

  nodeGroups.append('rect')
    .attr('width', d => d.w)
    .attr('height', d => d.h)
    .attr('fill', d => {
      const n = d.node;
      if (n.topic) return TOPIC_COLORS[n.topic] || '#888';
      if (type === 'inst' && n.label && instColorMap[n.label]) return instColorMap[n.label];
      if (type === 'inst') return INST_COLORS[d.idx % INST_COLORS.length];
      return C.fg2;
    })
    .attr('rx', 2)
    .on('mousemove', (e, d) => {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX+12)+'px';
      tooltip.style.top = (e.clientY+12)+'px';
      tooltip.innerHTML = `<b>${d.node.label}</b><br>Count: ${d.node.value || 0}`;
    })
    .on('mouseleave', () => { tooltip.style.display = 'none'; })
    .on('click', (e, d) => {
      e.stopPropagation();
      const idx = d.idx;
      if (selectedSankeyNode === idx) {
        selectedSankeyNode = null;
      } else {
        selectedSankeyNode = idx;
      }
      g.selectAll('.sankey-link')
        .style('fill-opacity', l => {
          if (selectedSankeyNode === null) return 0.35;
          return (l.source === selectedSankeyNode || l.target === selectedSankeyNode) ? 0.6 : 0.05;
        });
      g.selectAll('.sankey-node rect')
        .style('opacity', nd => {
          if (selectedSankeyNode === null) return 1;
          const connected = linkPaths.some(l =>
            (l.source === selectedSankeyNode && l.target === nd.idx) ||
            (l.target === selectedSankeyNode && l.source === nd.idx) ||
            nd.idx === selectedSankeyNode
          );
          return connected ? 1 : 0.3;
        });
      // Update topic labels with per-advisor counts when advisor selected
      g.selectAll('.sankey-node text')
        .text(d => {
          let label = d.node.label || '';
          if (label.length > 30) label = label.substring(0, 28) + '...';
          const base = label + (d.node.value ? ` (${d.node.value})` : '');
          if (selectedSankeyNode !== null && d.x >= w/2) {
            const link = linkPaths.find(l => l.source === selectedSankeyNode && l.target === d.idx);
            if (link) {
              const advName = data.nodes[selectedSankeyNode].label.split(',')[0];
              return base + ` — ${advName}: ${link.value}`;
            }
          }
          return base;
        });
    });

  // Click on background to deselect
  svg.on('click', () => {
    if (selectedSankeyNode !== null) {
      selectedSankeyNode = null;
      g.selectAll('.sankey-link').style('fill-opacity', 0.35);
      g.selectAll('.sankey-node rect').style('opacity', 1);
      // Reset labels to default
      g.selectAll('.sankey-node text')
        .text(d => {
          let label = d.node.label || '';
          if (label.length > 30) label = label.substring(0, 28) + '...';
          return label + (d.node.value ? ` (${d.node.value})` : '');
        });
    }
  });

  // Labels
  nodeGroups.append('text')
    .attr('x', d => {
      // Left labels for left column, right labels for right column
      const isLeft = d.x < w/2;
      return isLeft ? -4 : d.w + 4;
    })
    .attr('y', d => d.h/2)
    .attr('dy', '0.35em')
    .attr('text-anchor', d => d.x < w/2 ? 'end' : 'start')
    .attr('fill', C.fg)
    .style('font-size', '10px')
    .text(d => {
      let label = d.node.label || '';
      if (label.length > 30) label = label.substring(0, 28) + '...';
      return label + (d.node.value ? ` (${d.node.value})` : '');
    });

  // Column headers for all modes
  if (type === 'gen' && D.mode1.genLabels) {
    columns.forEach((col, ci) => {
      const label = D.mode1.genLabels[ci] || `Gen ${ci}`;
      g.append('text')
        .attr('x', ci * colWidth + nodeWidth/2)
        .attr('y', -18)
        .attr('text-anchor', 'middle')
        .attr('fill', C.fg)
        .style('font-size', '12px')
        .style('font-weight', 'bold')
        .text(label);
      // Subtitle: top scholars in this generation
      const scholars = D.mode1.genScholars?.[ci];
      if (scholars && scholars.length > 0) {
        g.append('text')
          .attr('x', ci * colWidth + nodeWidth/2)
          .attr('y', -4)
          .attr('text-anchor', 'middle')
          .attr('fill', C.fg2)
          .style('font-size', '10px')
          .style('font-style', 'italic')
          .text(scholars.join(', '));
      }
    });
  } else if (type === 'adv') {
    const headers = ['Top 30 Advisors', 'Research Topics'];
    columns.forEach((col, ci) => {
      if (ci < headers.length) {
        g.append('text')
          .attr('x', ci * colWidth + nodeWidth/2)
          .attr('y', -12)
          .attr('text-anchor', 'middle')
          .attr('fill', C.fg)
          .style('font-size', '12px')
          .style('font-weight', 'bold')
          .text(headers[ci]);
      }
    });
  } else if (type === 'inst') {
    const headers = ['PhD-Granting Institution', "Advisor's Institution"];
    columns.forEach((col, ci) => {
      if (ci < headers.length) {
        g.append('text')
          .attr('x', ci * colWidth + nodeWidth/2)
          .attr('y', -12)
          .attr('text-anchor', 'middle')
          .attr('fill', C.fg)
          .style('font-size', '12px')
          .style('font-weight', 'bold')
          .text(headers[ci]);
      }
    });
  }
}

function renderEvolution() {
  const dim = getDims();
  const C = getColors();
  const barH = Math.min(dim.h - 20, 500);
  const M = {top: 40, right: 180, bottom: 50, left: 60};
  const w = dim.w - M.left - M.right;
  const h = barH - M.top - M.bottom;

  const bins = D.mode4.bins;
  const topics = D.mode4.topics;
  const values = D.mode4.values;
  const totals = D.mode4.totals;

  // Sort topics by total count (most common at bottom)
  const topicTotals = {};
  topics.forEach(tid => {
    topicTotals[tid] = bins.reduce((s, b) => s + (values[b]?.[tid] || 0), 0);
  });
  const sortedTopics = [...topics].sort((a, b) => topicTotals[b] - topicTotals[a]);

  // Compute percentages (stacked)
  const stackData = bins.map(bin => {
    const total = totals[bin] || 1;
    const row = {bin};
    topics.forEach(tid => {
      row[tid] = (values[bin]?.[tid] || 0) / total * 100;
    });
    return row;
  });

  // ── Stacked Bar Chart ──
  const svg = d3.select('#container').append('svg')
    .attr('width', dim.w).attr('height', barH);
  const g = svg.append('g').attr('transform', `translate(${M.left},${M.top})`);

  const x = d3.scaleBand().domain(bins).range([0, w]).padding(0.05);
  const y = d3.scaleLinear().domain([0, 100]).range([h, 0]);

  const stack = d3.stack().keys(sortedTopics)(stackData);

  stack.forEach((layer, li) => {
    const tid = sortedTopics[li];
    g.append('g').selectAll('rect')
      .data(layer).join('rect')
      .attr('class', 'area-path')
      .attr('x', d => x(d.data.bin))
      .attr('y', d => y(d[1]))
      .attr('height', d => Math.max(0, y(d[0]) - y(d[1])))
      .attr('width', x.bandwidth())
      .attr('fill', TOPIC_COLORS[tid] || '#888')
      .on('mousemove', (e, d) => {
        const pct = (d[1] - d[0]).toFixed(1);
        const count = values[d.data.bin]?.[tid] || 0;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX+12)+'px';
        tooltip.style.top = (e.clientY+12)+'px';
        tooltip.innerHTML = `<b>${TL[tid] || tid}</b><br>${d.data.bin}<br>${count} dissertations (${pct}%)`;
      })
      .on('mouseleave', () => { tooltip.style.display = 'none'; });
  });

  // X axis
  g.append('g').attr('transform', `translate(0,${h})`)
    .call(d3.axisBottom(x))
    .selectAll('text')
    .attr('fill', C.fg).style('font-size', '9px')
    .attr('transform', 'rotate(-35)').attr('text-anchor', 'end');
  g.selectAll('.tick line').attr('stroke', C.border);
  g.selectAll('.domain').attr('stroke', C.border);

  // Y axis
  g.append('g').call(d3.axisLeft(y).ticks(5).tickFormat(d => d + '%'))
    .selectAll('text').attr('fill', C.fg);
  g.selectAll('.tick line').attr('stroke', C.border);

  // Y label
  g.append('text').attr('transform', 'rotate(-90)')
    .attr('x', -h/2).attr('y', -40)
    .attr('text-anchor', 'middle').attr('fill', C.fg2)
    .style('font-size', '12px').text('Percentage of dissertations');

  // Legend
  const legend = svg.append('g')
    .attr('transform', `translate(${dim.w - M.right + 15},${M.top})`);

  sortedTopics.slice(0, 20).forEach((tid, i) => {
    const lg = legend.append('g').attr('transform', `translate(0,${i*18})`);
    lg.append('rect').attr('width', 12).attr('height', 12)
      .attr('fill', TOPIC_COLORS[tid] || '#888').attr('rx', 2);
    lg.append('text').attr('x', 16).attr('y', 10)
      .attr('fill', C.fg).style('font-size', '10px')
      .text((TL[tid] || tid).substring(0, 22));
  });

  // Title
  svg.append('text').attr('x', dim.w/2).attr('y', 22)
    .attr('text-anchor', 'middle').attr('fill', C.fg)
    .style('font-size', '14px').style('font-weight', 'bold')
    .text('Topic Evolution Across Decades');

  // ── Sub-viz A: Decade Pie Charts ──
  const decades = {};
  bins.forEach(bin => {
    let decade;
    if (bin.startsWith('pre')) {
      decade = 'pre-1950';
    } else {
      const yr = parseInt(bin.split('-')[0]);
      decade = Math.floor(yr / 10) * 10 + 's';
    }
    if (!decades[decade]) decades[decade] = {};
    sortedTopics.forEach(tid => {
      decades[decade][tid] = (decades[decade][tid] || 0) + (values[bin]?.[tid] || 0);
    });
  });

  container.insertAdjacentHTML('beforeend',
    '<h3 style="color:var(--fg);margin:20px 0 10px;font-size:14px;text-align:center">Topic Distribution by Decade</h3>');

  const pieRow = document.createElement('div');
  pieRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:10px 0';
  container.appendChild(pieRow);

  const decadeKeys = Object.keys(decades);
  const pieSize = 130;
  const pieR = 50;

  decadeKeys.forEach(dk => {
    const decadeData = [];
    sortedTopics.forEach(tid => {
      const val = decades[dk][tid] || 0;
      if (val > 0) decadeData.push({tid, value: val});
    });
    if (decadeData.length === 0) return;

    const total = decadeData.reduce((s, d) => s + d.value, 0);
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'text-align:center';
    pieRow.appendChild(wrapper);

    const pieSvg = d3.select(wrapper).append('svg')
      .attr('width', pieSize).attr('height', pieSize);
    const pg = pieSvg.append('g')
      .attr('transform', `translate(${pieSize/2},${pieSize/2})`);

    const pie = d3.pie().value(d => d.value).sort(null);
    const arc = d3.arc().innerRadius(0).outerRadius(pieR);

    pg.selectAll('path').data(pie(decadeData)).join('path')
      .attr('d', arc)
      .attr('fill', d => TOPIC_COLORS[d.data.tid] || '#888')
      .attr('stroke', C.bg).attr('stroke-width', 0.5)
      .on('mousemove', (e, d) => {
        const pct = (d.data.value / total * 100).toFixed(1);
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY + 12) + 'px';
        tooltip.innerHTML = `<b>${TL[d.data.tid] || d.data.tid}</b><br>${d.data.value} (${pct}%)`;
      })
      .on('mouseleave', () => { tooltip.style.display = 'none'; });

    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:11px;color:var(--fg2);margin-top:2px';
    lbl.textContent = dk;
    wrapper.appendChild(lbl);
  });

  // ── Sub-viz B: Trend Line Chart ──
  container.insertAdjacentHTML('beforeend',
    '<h3 style="color:var(--fg);margin:20px 0 10px;font-size:14px;text-align:center">Topic Trends Over Time</h3>');

  const trendW = Math.min(dim.w, 1100);
  const trendLegendW = 200;
  const trendChartW = trendW - trendLegendW - 60;
  const trendH = 400;
  const tM = {top: 20, right: 10, bottom: 50, left: 50};
  const tw = trendChartW - tM.left - tM.right;
  const th = trendH - tM.top - tM.bottom;

  // Top 5 for toggle
  const top5 = sortedTopics.slice(0, 5);
  const visibleTopics = new Set(sortedTopics);
  let showTop5Only = false;

  const trendContainer = document.createElement('div');
  trendContainer.style.cssText = `display:flex;justify-content:center;align-items:flex-start;padding:0 10px`;
  container.appendChild(trendContainer);

  const trendSvgWrapper = document.createElement('div');
  trendContainer.appendChild(trendSvgWrapper);

  const trendSvg = d3.select(trendSvgWrapper).append('svg')
    .attr('width', trendChartW).attr('height', trendH);
  const tg = trendSvg.append('g').attr('transform', `translate(${tM.left},${tM.top})`);

  // Compute percentage data for lines
  const lineData = sortedTopics.map(tid => {
    return {
      tid,
      points: bins.map((bin, bi) => {
        const total = totals[bin] || 1;
        return {bin, idx: bi, pct: (values[bin]?.[tid] || 0) / total * 100};
      })
    };
  });

  const tx = d3.scalePoint().domain(bins).range([0, tw]).padding(0.5);
  const maxPct = d3.max(lineData, d => d3.max(d.points, p => p.pct)) || 10;
  const ty = d3.scaleLinear().domain([0, maxPct * 1.1]).range([th, 0]);

  // X axis
  tg.append('g').attr('transform', `translate(0,${th})`)
    .call(d3.axisBottom(tx))
    .selectAll('text')
    .attr('fill', C.fg).style('font-size', '9px')
    .attr('transform', 'rotate(-35)').attr('text-anchor', 'end');
  tg.selectAll('.tick line').attr('stroke', C.border);
  tg.selectAll('.domain').attr('stroke', C.border);

  // Y axis
  tg.append('g').call(d3.axisLeft(ty).ticks(5).tickFormat(d => d.toFixed(0) + '%'))
    .selectAll('text').attr('fill', C.fg);
  tg.selectAll('.tick line').attr('stroke', C.border);
  tg.selectAll('.domain').attr('stroke', C.border);

  const lineGen = d3.line()
    .x(d => tx(d.bin))
    .y(d => ty(d.pct))
    .curve(d3.curveMonotoneX);

  const lineGroup = tg.append('g');
  const lines = {};
  lineData.forEach(ld => {
    lines[ld.tid] = lineGroup.append('path')
      .datum(ld.points)
      .attr('d', lineGen)
      .attr('fill', 'none')
      .attr('stroke', TOPIC_COLORS[ld.tid] || '#888')
      .attr('stroke-width', 2)
      .attr('opacity', 0.8)
      .attr('class', 'trend-line');
  });

  // Crosshair + tooltip
  const crosshair = tg.append('line')
    .attr('y1', 0).attr('y2', th)
    .attr('stroke', C.fg2).attr('stroke-width', 0.5)
    .attr('stroke-dasharray', '3,3')
    .style('display', 'none');

  const overlay = tg.append('rect')
    .attr('width', tw).attr('height', th)
    .attr('fill', 'none').attr('pointer-events', 'all');

  overlay.on('mousemove', (e) => {
    const [mx] = d3.pointer(e);
    // Find closest bin
    let closestBin = bins[0];
    let closestDist = Infinity;
    bins.forEach(bin => {
      const bx = tx(bin);
      const dist = Math.abs(bx - mx);
      if (dist < closestDist) {
        closestDist = dist;
        closestBin = bin;
      }
    });
    crosshair.attr('x1', tx(closestBin)).attr('x2', tx(closestBin)).style('display', null);

    const total = totals[closestBin] || 1;
    let html = `<b>${closestBin}</b><br>`;
    sortedTopics.forEach(tid => {
      if (!visibleTopics.has(tid)) return;
      const count = values[closestBin]?.[tid] || 0;
      if (count === 0) return;
      const pct = (count / total * 100).toFixed(1);
      const color = TOPIC_COLORS[tid] || '#888';
      html += `<span style="color:${color}">●</span> ${TL[tid] || tid}: ${count} (${pct}%)<br>`;
    });
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY + 12) + 'px';
    tooltip.innerHTML = html;
  })
  .on('mouseleave', () => {
    crosshair.style('display', 'none');
    tooltip.style.display = 'none';
  });

  // Legend panel on the right
  const legendDiv = document.createElement('div');
  legendDiv.style.cssText = `width:${trendLegendW}px;padding:0 5px;font-size:11px;max-height:${trendH}px;overflow-y:auto`;
  trendContainer.appendChild(legendDiv);

  // Top 5 only button
  const top5Btn = document.createElement('button');
  top5Btn.className = 'btn';
  top5Btn.style.cssText = 'margin-bottom:8px;font-size:11px;width:100%';
  top5Btn.textContent = 'Top 5 only';
  legendDiv.appendChild(top5Btn);

  function updateLineVisibility() {
    sortedTopics.forEach(tid => {
      if (lines[tid]) {
        lines[tid].style('display', visibleTopics.has(tid) ? null : 'none');
      }
    });
  }

  top5Btn.addEventListener('click', () => {
    showTop5Only = !showTop5Only;
    top5Btn.textContent = showTop5Only ? 'Show all' : 'Top 5 only';
    visibleTopics.clear();
    if (showTop5Only) {
      top5.forEach(tid => visibleTopics.add(tid));
    } else {
      sortedTopics.forEach(tid => visibleTopics.add(tid));
    }
    // Sync legend item styling
    legendDiv.querySelectorAll('.legend-item').forEach(el => {
      const tid = el.dataset.tid;
      if (visibleTopics.has(tid)) {
        el.style.opacity = '1';
      } else {
        el.style.opacity = '0.3';
      }
    });
    updateLineVisibility();
  });

  // Legend items
  sortedTopics.forEach(tid => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.tid = tid;
    item.style.cssText = 'display:flex;align-items:center;gap:4px;cursor:pointer;padding:2px 0;user-select:none';
    const swatch = document.createElement('span');
    swatch.style.cssText = `display:inline-block;width:18px;height:3px;background:${TOPIC_COLORS[tid] || '#888'};flex-shrink:0`;
    const label = document.createElement('span');
    label.style.cssText = 'color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
    label.textContent = (TL[tid] || tid).substring(0, 24);
    item.appendChild(swatch);
    item.appendChild(label);
    legendDiv.appendChild(item);

    item.addEventListener('click', () => {
      if (visibleTopics.has(tid)) {
        visibleTopics.delete(tid);
        item.style.opacity = '0.3';
      } else {
        visibleTopics.add(tid);
        item.style.opacity = '1';
      }
      updateLineVisibility();
    });
  });

  // Bottom padding
  container.insertAdjacentHTML('beforeend', '<div style="height:30px"></div>');
}

function toggleTheme() {
  darkMode = !darkMode;
  document.body.classList.toggle('light-mode', !darkMode);
  document.getElementById('themeBtn').textContent = darkMode ? 'Light' : 'Dark';
  renderCurrent();
}

function exportPNG() {
  const svgEl = container.querySelector('svg');
  if (!svgEl) return;
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svgEl);
  const canvas = document.createElement('canvas');
  canvas.width = svgEl.getAttribute('width');
  canvas.height = svgEl.getAttribute('height');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    const bg = getComputedStyle(document.body).getPropertyValue('--bg').trim();
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    const link = document.createElement('a');
    link.download = 'intellectual_flow.png';
    link.href = canvas.toDataURL();
    link.click();
  };
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
}

// Resize
window.addEventListener('resize', () => renderCurrent());

// Init
document.body.classList.add('light-mode');
darkMode = false;
document.getElementById('themeBtn').textContent = 'Dark';
renderCurrent();
</script>
