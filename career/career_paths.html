const INSTS = D.insts, NS = D.instShort, IC = D.instColors;
const N_INST = INSTS.length;
const N_SUBCAT = D.nSubcats;
const SUBCAT_LABELS = D.subcatLabels;
const SUBCAT_COLORS = D.subcatColors;
const N_TOTAL = N_INST + N_SUBCAT;

function arcLabel(i) {
  return i < N_INST ? (NS[INSTS[i]] || INSTS[i]) : SUBCAT_LABELS[i - N_INST];
}
function arcColor(i) {
  return i < N_INST ? (IC[INSTS[i]] || '#666') : SUBCAT_COLORS[i - N_INST];
}
function isSubcat(i) { return i >= N_INST; }

let darkMode = true, currentMode = 1, hideSelf = false;
let selectedArc = -1, genFilter = 'all', searchTerm = '', tlScroll = 0;
const tip = document.getElementById('tooltip');
const container = document.getElementById('container');
const info = document.getElementById('info');

// Populate controls
D.gens.forEach(g => {
  const o = document.createElement('option');
  o.value = g.key; o.textContent = g.label;
  document.getElementById('genSel').appendChild(o);
});
INSTS.forEach(inst => {
  const o = document.createElement('option');
  o.value = inst; o.textContent = NS[inst] || inst;
  document.getElementById('instSel').appendChild(o);
});

info.innerHTML = `${D.meta.withCurrent} of ${D.meta.totalScholars} scholars with known current institution (${(100*D.meta.withCurrent/D.meta.totalScholars).toFixed(1)}%). ${D.meta.withMoves} with career moves.`;

function showTip(evt, html) {
  tip.innerHTML = html; tip.style.display = 'block';
  let x = evt.pageX + 12, y = evt.pageY - 10;
  if (x + 360 > window.innerWidth) x = evt.pageX - 360;
  if (y + tip.offsetHeight > window.innerHeight) y = window.innerHeight - tip.offsetHeight - 5;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}
function hideTip() { tip.style.display = 'none'; }

function setMode(m) {
  currentMode = m;
  [1,2,3,4].forEach(i => document.getElementById('btnM'+i).classList.toggle('active', i===m));
  document.getElementById('ctrlGen').style.display = '';
  document.getElementById('ctrlSelf').style.display = (m===1||m===4) ? '' : 'none';
  document.getElementById('ctrlInst').style.display = m===2 ? '' : 'none';
  document.getElementById('ctrlSearch').style.display = m===3 ? '' : 'none';
  selectedArc = -1; tlScroll = 0;
  renderCurrent();
}

function onGenChange() { genFilter = document.getElementById('genSel').value; renderCurrent(); }
function toggleSelf() {
  hideSelf = !hideSelf;
  document.getElementById('btnSelf').textContent = hideSelf ? 'Show Self-Placement' : 'Hide Self-Placement';
  renderCurrent();
}
function toggleTheme() {
  darkMode = !darkMode;
  document.body.classList.toggle('light-mode', !darkMode);
  document.getElementById('themeBtn').textContent = darkMode ? 'Light' : 'Dark';
  renderCurrent();
}
function onSearch() { searchTerm = document.getElementById('searchBox').value.toLowerCase(); tlScroll = 0; renderMode3(); }

function getW() { return window.innerWidth; }
function getH() { return window.innerHeight - document.getElementById('toolbar').offsetHeight - 2; }

function renderCurrent() {
  container.innerHTML = ''; hideTip();
  if (currentMode === 1) renderMode1();
  else if (currentMode === 2) renderMode2();
  else if (currentMode === 3) renderMode3();
  else renderMode4();
}

// ======================== MODE 1: CHORD DIAGRAM ========================
function renderMode1() {
  const W = getW(), H = getH();
  const R = Math.min(W, H) * 0.38;
  const cx = W / 2, cy = H / 2;

  let mat = D.chord;
  if (genFilter !== 'all' && D.chordByGen[genFilter]) mat = D.chordByGen[genFilter];

  // Apply hideSelf
  if (hideSelf) {
    mat = mat.map((row, i) => row.map((v, j) => i === j ? 0 : v));
  }

  const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);
  const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);

  // Check if matrix is all zeros
  const total = mat.flat().reduce((a,b) => a+b, 0);
  if (total === 0) {
    g.append('text').attr('text-anchor','middle').attr('fill','var(--fg2)')
      .attr('font-size',14).text('No data for this generation');
    return;
  }

  const chord = d3.chord().padAngle(0.04).sortSubgroups(d3.descending)(mat);
  const arc = d3.arc().innerRadius(R).outerRadius(R + 20);
  const ribbon = d3.ribbon().radius(R);

  // Arcs
  const arcs = g.selectAll('.chord-arc').data(chord.groups).enter()
    .append('g').attr('class', 'chord-arc');
  arcs.append('path').attr('d', arc)
    .attr('fill', d => arcColor(d.index))
    .attr('fill-opacity', d => isSubcat(d.index) ? 0.5 : 1)
    .attr('stroke', d => isSubcat(d.index) ? 'var(--fg)' : 'none')
    .attr('stroke-width', d => isSubcat(d.index) ? 0.5 : 0)
    .attr('stroke-dasharray', d => isSubcat(d.index) ? '3,2' : 'none')
    .on('click', (evt, d) => {
      selectedArc = selectedArc === d.index ? -1 : d.index;
      updateChordHighlight();
    })
    .on('mouseover', (evt, d) => {
      const lbl = arcLabel(d.index);
      const phds = mat[d.index].reduce((a,b)=>a+b,0);
      const emps = mat.reduce((a,row)=>a+row[d.index],0);
      const tag = isSubcat(d.index) ? ' (group)' : '';
      showTip(evt, `<b>${lbl}</b>${tag}<br>PhDs from here: ${phds}<br>Employed here: ${emps}`);
    })
    .on('mouseout', hideTip);

  // Arc labels
  arcs.append('text')
    .each(d => { d.angle = (d.startAngle + d.endAngle) / 2; })
    .attr('dy', '.35em')
    .attr('transform', d => {
      const a = d.angle * 180 / Math.PI - 90;
      return `rotate(${a}) translate(${R + 24}) ${a > 90 ? 'rotate(180)' : ''}`;
    })
    .attr('text-anchor', d => d.angle > Math.PI ? 'end' : 'start')
    .attr('fill', d => isSubcat(d.index) ? 'var(--fg2)' : 'var(--fg)')
    .attr('font-size', d => isSubcat(d.index) ? 9 : 10)
    .attr('font-style', d => isSubcat(d.index) ? 'italic' : 'normal')
    .text(d => arcLabel(d.index));

  // Ribbons
  g.selectAll('.chord-ribbon').data(chord).enter()
    .append('path').attr('class', 'chord-ribbon')
    .attr('d', ribbon)
    .attr('fill', d => arcColor(d.source.index))
    .attr('fill-opacity', d => (isSubcat(d.source.index) || isSubcat(d.target.index)) ? 0.25 : 0.45)
    .on('mouseover', (evt, d) => {
      const from = arcLabel(d.source.index), to = arcLabel(d.target.index);
      const key = `${d.source.index}_${d.target.index}`;
      const lk = genFilter !== 'all' && D.matrixByGen[genFilter] ?
        D.matrixByGen[genFilter].lookup : D.matrixLookup;
      const names = lk[key] || [];
      const cnt = mat[d.source.index][d.target.index];
      let h = `<b>${from}</b> → <b>${to}</b>: ${cnt}`;
      if (names.length) h += '<br>' + names.slice(0,15).join(', ');
      if (names.length > 15) h += `<br>... and ${names.length-15} more`;
      showTip(evt, h);
    })
    .on('mouseout', hideTip);

  function updateChordHighlight() {
    g.selectAll('.chord-ribbon')
      .classed('dim', d => selectedArc >= 0 &&
        d.source.index !== selectedArc && d.target.index !== selectedArc);
  }

  // Title
  svg.append('text').attr('x', 12).attr('y', 20)
    .attr('fill','var(--fg)').attr('font-size',14).attr('font-weight','bold')
    .text('Scholar Migration: PhD Institution → Current Employment');
  svg.append('text').attr('x', 12).attr('y', 36)
    .attr('fill','var(--fg2)').attr('font-size',11)
    .text(`${total} placements · top ${N_INST} institutions + ${N_SUBCAT} category groups (italic = aggregate)`);
}

// ======================== MODE 2: INSTITUTIONAL PIPELINE ========================
function renderMode2() {
  const inst = document.getElementById('instSel').value;
  const pipe = D.pipelines[inst];
  if (!pipe) return;

  const W = getW(), H = getH();
  const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);
  const margin = {top: 70, right: 30, bottom: 30, left: 30};
  const midX = W / 2;
  const barW = (W - margin.left - margin.right) / 2 - 40;
  const barH = 22, gap = 4;

  // Title
  svg.append('text').attr('x', midX).attr('y', 22).attr('text-anchor','middle')
    .attr('fill','var(--fg)').attr('font-size',15).attr('font-weight','bold')
    .text(NS[inst] || inst);
  const selfPct = pipe.phdCount > 0 ? (100*pipe.selfCount/pipe.phdCount).toFixed(0) : 0;
  svg.append('text').attr('x', midX).attr('y', 42).attr('text-anchor','middle')
    .attr('fill','var(--fg2)').attr('font-size',12)
    .text(`${pipe.phdCount} PhDs trained · ${pipe.empCount} currently employed · ${pipe.selfCount} self-placed (${selfPct}%)`);

  // Left: outflow
  svg.append('text').attr('x', margin.left).attr('y', margin.top - 8)
    .attr('fill','var(--fg)').attr('font-size',12).attr('font-weight','bold')
    .text('Where PhDs Went →');

  const maxOut = d3.max(pipe.outflow, d => d.count) || 1;
  const xOut = d3.scaleLinear().domain([0, maxOut]).range([0, barW]);

  const outG = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
  // Self-placement bar first
  if (pipe.selfCount > 0 && !hideSelf) {
    outG.append('rect').attr('class','bar-rect')
      .attr('x', 0).attr('y', 0).attr('width', xOut(pipe.selfCount))
      .attr('height', barH).attr('fill', IC[inst] || '#666').attr('opacity', 0.6)
      .attr('stroke', 'var(--highlight)').attr('stroke-width', 2)
      .on('mouseover', evt => showTip(evt, `<b>Stayed at ${NS[inst]}</b>: ${pipe.selfCount}<br>${pipe.selfScholars.slice(0,15).join(', ')}`))
      .on('mouseout', hideTip);
    outG.append('text').attr('x', xOut(pipe.selfCount)+4).attr('y', barH/2+4)
      .attr('fill','var(--fg)').attr('font-size',10)
      .text(`Self (${pipe.selfCount})`);
  }

  const outOffset = (pipe.selfCount > 0 && !hideSelf) ? barH + gap : 0;
  pipe.outflow.forEach((d, i) => {
    const y = outOffset + i * (barH + gap);
    const color = IC[d.inst] || '#555';
    outG.append('rect').attr('class','bar-rect')
      .attr('x', 0).attr('y', y).attr('width', xOut(d.count))
      .attr('height', barH).attr('fill', color).attr('opacity', 0.7)
      .on('mouseover', evt => {
        let h = `<b>${NS[d.inst]||d.inst}</b>: ${d.count}`;
        h += '<br>' + d.scholars.slice(0,15).join(', ');
        showTip(evt, h);
      })
      .on('mouseout', hideTip);
    outG.append('text').attr('x', xOut(d.count)+4).attr('y', y + barH/2+4)
      .attr('fill','var(--fg)').attr('font-size',10)
      .text(`${NS[d.inst]||d.inst} (${d.count})`);
  });

  // Right: inflow
  svg.append('text').attr('x', midX + 20).attr('y', margin.top - 8)
    .attr('fill','var(--fg)').attr('font-size',12).attr('font-weight','bold')
    .text('← Where Faculty Trained');

  const maxIn = d3.max(pipe.inflow, d => d.count) || 1;
  const xIn = d3.scaleLinear().domain([0, maxIn]).range([0, barW]);

  const inG = svg.append('g').attr('transform', `translate(${midX + 20},${margin.top})`);
  // Self-trained first
  if (pipe.selfCount > 0 && !hideSelf) {
    inG.append('rect').attr('class','bar-rect')
      .attr('x', 0).attr('y', 0).attr('width', xIn(pipe.selfCount))
      .attr('height', barH).attr('fill', IC[inst] || '#666').attr('opacity', 0.6)
      .attr('stroke', 'var(--highlight)').attr('stroke-width', 2)
      .on('mouseover', evt => showTip(evt, `<b>Trained here</b>: ${pipe.selfCount}<br>${pipe.selfScholars.slice(0,15).join(', ')}`))
      .on('mouseout', hideTip);
    inG.append('text').attr('x', xIn(pipe.selfCount)+4).attr('y', barH/2+4)
      .attr('fill','var(--fg)').attr('font-size',10)
      .text(`Self (${pipe.selfCount})`);
  }

  pipe.inflow.forEach((d, i) => {
    const y = outOffset + i * (barH + gap);
    const color = IC[d.inst] || '#555';
    inG.append('rect').attr('class','bar-rect')
      .attr('x', 0).attr('y', y).attr('width', xIn(d.count))
      .attr('height', barH).attr('fill', color).attr('opacity', 0.7)
      .on('mouseover', evt => {
        let h = `<b>${NS[d.inst]||d.inst}</b>: ${d.count}`;
        h += '<br>' + d.scholars.slice(0,15).join(', ');
        showTip(evt, h);
      })
      .on('mouseout', hideTip);
    inG.append('text').attr('x', xIn(d.count)+4).attr('y', y + barH/2+4)
      .attr('fill','var(--fg)').attr('font-size',10)
      .text(`${NS[d.inst]||d.inst} (${d.count})`);
  });

  // Divider line
  svg.append('line').attr('x1', midX+10).attr('y1', margin.top - 15)
    .attr('x2', midX+10).attr('y2', H - margin.bottom)
    .attr('stroke', 'var(--border)').attr('stroke-width', 1);
}

// ======================== MODE 3: CAREER TIMELINES ========================
function renderMode3() {
  const W = getW(), H = getH();
  const margin = {top: 50, right: 20, bottom: 30, left: 200};

  let data = D.timelines;
  // Filter by search
  if (searchTerm) {
    data = data.filter(d => d.n.toLowerCase().includes(searchTerm));
  }
  // Filter by generation
  if (genFilter !== 'all') {
    data = data.filter(d => d.g === genFilter);
  }
  // Sort
  const sortBy = document.getElementById('sortSel').value;
  if (sortBy === 'moves') data = [...data].sort((a,b) => b.m - a.m);
  else if (sortBy === 'name') data = [...data].sort((a,b) => a.n.localeCompare(b.n));
  else data = [...data].sort((a,b) => (a.y||9999) - (b.y||9999));

  const rowH = 24, visibleRows = Math.floor((H - margin.top - margin.bottom) / rowH);
  const totalRows = data.length;
  const maxScroll = Math.max(0, totalRows - visibleRows);
  tlScroll = Math.min(tlScroll, maxScroll);

  const visible = data.slice(tlScroll, tlScroll + visibleRows);
  const plotW = W - margin.left - margin.right;

  // Year range
  let minYear = 1950, maxYear = 2026;
  const xScale = d3.scaleLinear().domain([minYear, maxYear]).range([0, plotW]);

  const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);

  // Title
  svg.append('text').attr('x', 12).attr('y', 20)
    .attr('fill','var(--fg)').attr('font-size',14).attr('font-weight','bold')
    .text(`Career Timelines (${data.length} scholars with career moves)`);
  svg.append('text').attr('x', 12).attr('y', 36)
    .attr('fill','var(--fg2)').attr('font-size',11)
    .text(tlScroll > 0 || totalRows > visibleRows ?
      `Showing ${tlScroll+1}–${Math.min(tlScroll+visibleRows, totalRows)} of ${totalRows}. Scroll to navigate.` :
      `${totalRows} scholars shown.`);

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  // Year axis
  const xAxis = d3.axisTop(xScale).ticks(10).tickFormat(d3.format('d'));
  g.append('g').call(xAxis).selectAll('text').attr('fill','var(--fg2)').attr('font-size',10);
  g.selectAll('.domain,.tick line').attr('stroke','var(--border)');

  // Grid lines
  xScale.ticks(10).forEach(yr => {
    g.append('line').attr('x1', xScale(yr)).attr('x2', xScale(yr))
      .attr('y1', 0).attr('y2', visibleRows * rowH)
      .attr('stroke', 'var(--border)').attr('stroke-opacity', 0.3);
  });

  // Rows
  visible.forEach((scholar, i) => {
    const y = i * rowH;
    const row = g.append('g').attr('class','tl-row').attr('transform', `translate(0,${y})`);

    // Background
    row.append('rect').attr('class','tl-bg')
      .attr('x', -margin.left).attr('y', 0).attr('width', W).attr('height', rowH)
      .attr('fill', i % 2 === 0 ? 'transparent' : 'var(--fg)').attr('fill-opacity', 0.03);

    // Name label
    row.append('text').attr('x', -8).attr('y', rowH/2 + 4)
      .attr('text-anchor', 'end').attr('fill', 'var(--fg)').attr('font-size', 10)
      .text(scholar.n.length > 28 ? scholar.n.slice(0,26)+'..' : scholar.n);

    // Affiliation bars
    scholar.a.forEach(aff => {
      const x1 = aff.s ? xScale(Math.max(aff.s, minYear)) : xScale(minYear);
      const x2 = aff.e ? xScale(Math.min(aff.e, maxYear)) : xScale(maxYear);
      const w = Math.max(x2 - x1, 4);
      const color = IC[aff.i] || '#555';

      row.append('rect').attr('class','tl-bar')
        .attr('x', x1).attr('y', 3).attr('width', w).attr('height', rowH - 6)
        .attr('fill', color).attr('fill-opacity', 0.75)
        .on('mouseover', evt => {
          const yrText = (aff.s||'?') + '–' + (aff.e||'present');
          showTip(evt, `<b>${scholar.n}</b><br>${NS[aff.i]||aff.i}<br>${aff.r} (${yrText})`);
        })
        .on('mouseout', hideTip);
    });
  });

  // Scroll handling
  container.style.overflowY = 'hidden';
  svg.on('wheel', evt => {
    evt.preventDefault();
    const delta = evt.deltaY > 0 ? 3 : -3;
    tlScroll = Math.max(0, Math.min(maxScroll, tlScroll + delta));
    renderMode3();
  });

  // Scrollbar indicator
  if (totalRows > visibleRows) {
    const sbH = H - margin.top - margin.bottom;
    const thumbH = Math.max(20, sbH * visibleRows / totalRows);
    const thumbY = margin.top + (sbH - thumbH) * (tlScroll / maxScroll);
    svg.append('rect').attr('x', W - 8).attr('y', thumbY)
      .attr('width', 6).attr('height', thumbH).attr('rx', 3)
      .attr('fill', 'var(--fg2)').attr('opacity', 0.4);
  }
}

// ======================== MODE 4: PLACEMENT MATRIX ========================
function renderMode4() {
  const W = getW(), H = getH();
  const labels = [...INSTS.map(i => NS[i] || i), ...SUBCAT_LABELS];
  const n = labels.length;

  let mat = D.matrix;
  let lookup = D.matrixLookup;
  if (genFilter !== 'all' && D.matrixByGen[genFilter]) {
    mat = D.matrixByGen[genFilter].matrix;
    lookup = D.matrixByGen[genFilter].lookup;
  }

  if (hideSelf) {
    mat = mat.map((row, i) => row.map((v, j) => i === j ? 0 : v));
  }

  const margin = {top: 140, right: 80, bottom: 20, left: 180};
  const cellW = Math.min(30, (W - margin.left - margin.right) / n);
  const cellH = Math.min(24, (H - margin.top - margin.bottom) / n);
  const plotW = cellW * n, plotH = cellH * n;

  const maxVal = d3.max(mat.flat().filter(v => v > 0)) || 1;
  const colorScale = d3.scaleSequential(d3.interpolateYlOrRd).domain([0, maxVal]);

  const svg = d3.select(container).append('svg')
    .attr('width', margin.left + plotW + margin.right)
    .attr('height', margin.top + plotH + margin.bottom);

  // Title
  svg.append('text').attr('x', 12).attr('y', 20)
    .attr('fill','var(--fg)').attr('font-size',14).attr('font-weight','bold')
    .text('Placement Matrix: PhD Institution (rows) × Employment (columns)');

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  // Column labels (rotated)
  labels.forEach((l, j) => {
    g.append('text')
      .attr('transform', `translate(${j * cellW + cellW/2},0) rotate(-55)`)
      .attr('text-anchor', 'start').attr('fill', 'var(--fg)').attr('font-size', 9)
      .text(l);
  });

  // Row labels
  labels.forEach((l, i) => {
    g.append('text').attr('x', -6).attr('y', i * cellH + cellH/2 + 3)
      .attr('text-anchor', 'end').attr('fill', 'var(--fg)').attr('font-size', 9)
      .text(l);
  });

  // Cells
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const v = mat[i][j];
      if (v === 0) continue;
      const isDiag = i === j;
      g.append('rect').attr('class', 'hm-cell')
        .attr('x', j * cellW).attr('y', i * cellH)
        .attr('width', cellW).attr('height', cellH)
        .attr('fill', colorScale(v))
        .attr('stroke', isDiag ? '#f5a623' : 'var(--bg)')
        .attr('stroke-width', isDiag ? 2 : 1)
        .on('mouseover', evt => {
          const key = `${i}_${j}`;
          const names = lookup[key] || [];
          const from = labels[i], to = labels[j];
          let h = `<b>${from}</b> → <b>${to}</b>: ${v}`;
          if (isDiag) h += ' (self-placed)';
          if (names.length) h += '<br>' + names.slice(0,20).join(', ');
          if (names.length > 20) h += `<br>... and ${names.length-20} more`;
          showTip(evt, h);
        })
        .on('mouseout', hideTip);

      // Show count in cell if it fits
      if (cellW >= 18 && v > 0) {
        g.append('text')
          .attr('x', j * cellW + cellW/2).attr('y', i * cellH + cellH/2 + 3)
          .attr('text-anchor', 'middle').attr('font-size', 8)
          .attr('fill', v > maxVal * 0.5 ? '#fff' : 'var(--fg)')
          .attr('pointer-events', 'none')
          .text(v);
      }
    }
  }

  // Marginal bars: row totals (right)
  const rtMax = d3.max(D.rowTotals) || 1;
  const rtScale = d3.scaleLinear().domain([0, rtMax]).range([0, 60]);
  D.rowTotals.forEach((v, i) => {
    if (v > 0) {
      g.append('rect').attr('x', plotW + 4).attr('y', i * cellH + 2)
        .attr('width', rtScale(v)).attr('height', cellH - 4)
        .attr('fill', 'var(--highlight)').attr('opacity', 0.5);
      g.append('text').attr('x', plotW + rtScale(v) + 8).attr('y', i * cellH + cellH/2 + 3)
        .attr('fill','var(--fg2)').attr('font-size', 8).text(v);
    }
  });

  // Marginal bars: column totals (top)
  const ctMax = d3.max(D.colTotals) || 1;
  const ctScale = d3.scaleLinear().domain([0, ctMax]).range([0, 40]);
  D.colTotals.forEach((v, j) => {
    if (v > 0) {
      g.append('rect').attr('x', j * cellW + 2).attr('y', -ctScale(v) - 4)
        .attr('width', cellW - 4).attr('height', ctScale(v))
        .attr('fill', 'var(--highlight)').attr('opacity', 0.4);
    }
  });

  // Row/Col axis labels
  svg.append('text').attr('x', margin.left + plotW + 10).attr('y', margin.top - 50)
    .attr('fill','var(--fg2)').attr('font-size',9).text('PhDs');
  svg.append('text').attr('x', margin.left - 10).attr('y', margin.top + plotH + 16)
    .attr('fill','var(--fg2)').attr('font-size',9).attr('text-anchor','end').text('PhD inst ↓');
  svg.append('text').attr('x', margin.left + plotW/2).attr('y', margin.top + plotH + 16)
    .attr('text-anchor','middle').attr('fill','var(--fg2)').attr('font-size',9)
    .text('Employment inst →');
}

// ======================== EXPORT ========================
function exportPNG() {
  const svgEl = container.querySelector('svg');
  if (!svgEl) return;
  const clone = svgEl.cloneNode(true);
  // Set explicit background
  const bg = getComputedStyle(document.body).getPropertyValue('--bg').trim();
  clone.setAttribute('style', `background:${bg}`);
  const xml = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([xml], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = svgEl.clientWidth * 2; c.height = svgEl.clientHeight * 2;
    const ctx = c.getContext('2d');
    ctx.scale(2, 2);
    ctx.fillStyle = bg; ctx.fillRect(0, 0, c.width, c.height);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = `career_paths_mode${currentMode}.png`;
    a.href = c.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

function exportCSV() {
  let csv = '';
  if (currentMode === 1 || currentMode === 4) {
    const labels = currentMode === 4
      ? [...INSTS, ...SUBCAT_LABELS]
      : [...INSTS, ...SUBCAT_LABELS];
    const mat = currentMode === 4 ? D.matrix : D.chord;
    csv = ',' + labels.join(',') + '\n';
    mat.forEach((row, i) => {
      csv += labels[i] + ',' + row.join(',') + '\n';
    });
  } else if (currentMode === 3) {
    csv = 'name,phd_institution,phd_year,generation,current_institution,moves,trajectory\n';
    D.timelines.forEach(t => {
      const traj = t.a.map(a => `${a.i}(${a.s||'?'}-${a.e||'present'})`).join(' > ');
      csv += `"${t.n}","${t.p}",${t.y||''},${t.g},"${t.ci}",${t.m},"${traj}"\n`;
    });
  } else {
    const inst = document.getElementById('instSel').value;
    const pipe = D.pipelines[inst];
    if (!pipe) return;
    csv = 'direction,institution,count,scholars\n';
    csv += `self,"${inst}",${pipe.selfCount},"${pipe.selfScholars.join('; ')}"\n`;
    pipe.outflow.forEach(d => {
      csv += `outflow,"${d.inst}",${d.count},"${d.scholars.join('; ')}"\n`;
    });
    pipe.inflow.forEach(d => {
      csv += `inflow,"${d.inst}",${d.count},"${d.scholars.join('; ')}"\n`;
    });
  }
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.download = `career_paths_mode${currentMode}.csv`;
  a.href = URL.createObjectURL(blob);
  a.click();
}

// Init
window.addEventListener('resize', renderCurrent);
renderCurrent();
