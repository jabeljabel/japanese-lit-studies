let currentCategory = 'all';
let selectedTerm = null;

document.getElementById('category-select').addEventListener('change', e => {
currentCategory = e.target.value;
selectedTerm = null;
render();
});

document.getElementById('theme-toggle').addEventListener('click', () => {
document.body.classList.toggle('light-mode');
document.body.classList.toggle('dark-mode');
document.getElementById('theme-toggle').textContent =
document.body.classList.contains('light-mode') ? '🌙 Dark Mode' : '☀️ Light Mode';
render();
});

function render() {
const container = document.getElementById('chart');
container.innerHTML = '';

const filtered = currentCategory === 'all' ? data :
data.filter(d => d.term_category === currentCategory);

// Group by decade and term
const byDecade = d3.group(filtered, d => d.decade);
const decades = Array.from(byDecade.keys()).sort();

const width = 900;
const height = 440;
const margin = {top: 20, right: 20, bottom: 90, left: 60};

const svg = d3.select('#chart').append('svg')
.attr('width', width)
.attr('height', height);

const g = svg.append('g')
.attr('transform', `translate(${margin.left},${margin.top})`);

const innerWidth = width - margin.left - margin.right;
const innerHeight = height - margin.top - margin.bottom;

// Background rect to deselect on empty click
g.append('rect')
.attr('x', 0).attr('y', 0)
.attr('width', innerWidth).attr('height', innerHeight)
.attr('fill', 'transparent')
.on('click', () => { selectedTerm = null; render(); });

// Get top 10 terms overall by frequency
const termTotals = {};
filtered.forEach(d => {
if (!termTotals[d.term]) termTotals[d.term] = 0;
termTotals[d.term] += d.frequency;
});
const topTerms = Object.entries(termTotals)
.sort((a,b) => b[1] - a[1])
.slice(0, 10)
.map(([term]) => term);

// Prepare series data
const series = topTerms.map(term => ({
term,
values: decades.map(decade => {
const decadeData = byDecade.get(decade);
const termData = decadeData ? decadeData.find(d => d.term === term) : null;
return { decade, proportion: termData ? termData.proportion : 0 };
})
}));

// Scales
const xScale = d3.scaleBand()
.domain(decades)
.range([0, innerWidth])
.padding(0.1);

const yMax = d3.max(series, s => d3.max(s.values, v => v.proportion)) || 0.001;
const yScale = d3.scaleLinear()
.domain([0, yMax])
.range([innerHeight, 0]);

const colorScale = d3.scaleOrdinal(d3.schemeCategory10);

// Draw lines
const line = d3.line()
.x(d => xScale(d.decade) + xScale.bandwidth() / 2)
.y(d => yScale(d.proportion));

series.forEach(s => {
const isSelected = selectedTerm === s.term;
const isFaded = selectedTerm !== null && !isSelected;
const opacity = isFaded ? 0.12 : 1;
const sw = isSelected ? 3.5 : 2;

// Invisible wider path for easier clicking
g.append('path')
.datum(s.values)
.attr('fill', 'none')
.attr('stroke', 'transparent')
.attr('stroke-width', 12)
.attr('d', line)
.attr('cursor', 'pointer')
.on('click', (event) => {
event.stopPropagation();
selectedTerm = (selectedTerm === s.term) ? null : s.term;
render();
});

g.append('path')
.datum(s.values)
.attr('fill', 'none')
.attr('stroke', colorScale(s.term))
.attr('stroke-width', sw)
.attr('opacity', opacity)
.attr('d', line)
.attr('pointer-events', 'none');

// Dots
g.selectAll(`.dot-${s.term.replace(/[\s&]/g, '-')}`)
.data(s.values)
.enter().append('circle')
.attr('cx', d => xScale(d.decade) + xScale.bandwidth() / 2)
.attr('cy', d => yScale(d.proportion))
.attr('r', isSelected ? 4 : 3)
.attr('fill', colorScale(s.term))
.attr('opacity', opacity)
.attr('pointer-events', 'none');
});

// Axes
g.append('g')
.attr('class', 'axis')
.attr('transform', `translate(0,${innerHeight})`)
.call(d3.axisBottom(xScale));

g.append('g')
.attr('class', 'axis')
.call(d3.axisLeft(yScale).tickFormat(d3.format('.1%')));

// Legend — 2 rows of 5
const legend = svg.append('g')
.attr('transform', `translate(${margin.left},${height - 72})`);

series.forEach((s, i) => {
const col = i % 5;
const row = Math.floor(i / 5);
const isSelected = selectedTerm === s.term;
const isFaded = selectedTerm !== null && !isSelected;
const opacity = isFaded ? 0.25 : 1;

const lg = legend.append('g')
.attr('transform', `translate(${col * 168},${row * 20})`)
.attr('cursor', 'pointer')
.on('click', () => {
selectedTerm = (selectedTerm === s.term) ? null : s.term;
render();
});

lg.append('line')
.attr('x1', 0).attr('x2', 20).attr('y1', 0).attr('y2', 0)
.attr('stroke', colorScale(s.term))
.attr('stroke-width', isSelected ? 3 : 2)
.attr('opacity', opacity);

lg.append('text')
.attr('x', 25).attr('y', 4)
.style('font-size', '11px')
.style('fill', 'var(--fg)')
.style('opacity', opacity)
.style('font-weight', isSelected ? '700' : 'normal')
.text(s.term);
});
}

render();
</script>
