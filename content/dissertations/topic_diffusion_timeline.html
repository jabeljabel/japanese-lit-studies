let DATA = KEYWORD_DATA;  // Start with keyword data
let currentSource = 'keyword';

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const topicSelect = document.getElementById('topicSelect');
const yearSlider = document.getElementById('yearSlider');
const yearLabel = document.getElementById('yearLabel');
const tooltip = document.getElementById('tooltip');
const playBtn = document.getElementById('playBtn');
const themeBtn = document.getElementById('themeBtn');
const keywordBtn = document.getElementById('keywordBtn');
const nlpBtn = document.getElementById('nlpBtn');
const combinedBtn = document.getElementById('combinedBtn');

let darkMode = true;
let currentTopic = '';
let currentYear = 2025;
let playing = false;
let playInterval = null;
let hoveredDot = null;

// Function to populate topic dropdown
function populateTopicDropdown() {
  topicSelect.innerHTML = '';
  const topics = [...DATA.topics].sort((a,b) => b.count - a.count);
  topics.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.label} (${t.count})`;
    topicSelect.appendChild(opt);
  });
  currentTopic = topics[0]?.id || '';
}

// Initialize
populateTopicDropdown();

// Institution colors
const INST_COLORS = [
  '#e94560','#0f3460','#16c79a','#f5a623','#9b59b6',
  '#3498db','#e67e22','#2ecc71','#e74c3c','#1abc9c',
  '#f39c12','#8e44ad','#2980b9','#d35400','#27ae60'
];

// Layout
const MARGIN = { top: 70, right: 30, bottom: 50, left: 240 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = Math.max(700, window.innerHeight - document.getElementById('toolbar').offsetHeight);
  canvas.style.marginTop = '0';
  draw();
}

function yearToX(year) {
  const w = canvas.width - MARGIN.left - MARGIN.right;
  return MARGIN.left + (year - 1950) / (2025 - 1950) * w;
}

function instToY(idx) {
  const h = canvas.height - MARGIN.top - MARGIN.bottom;
  const n = DATA.institutions.length;
  return MARGIN.top + (idx + 0.5) / n * h;
}

function getVisibleDots() {
  return DATA.dissertations.filter(d =>
    d.topics[currentTopic] && d.year && d.year <= currentYear
  );
}

function draw() {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg').trim();
  ctx.fillRect(0, 0, w, h);

  const fg = getComputedStyle(document.body).getPropertyValue('--fg').trim();
  const fg2 = getComputedStyle(document.body).getPropertyValue('--fg2').trim();
  const border = getComputedStyle(document.body).getPropertyValue('--border').trim();

  // Title
  ctx.fillStyle = fg;
  ctx.font = 'bold 16px -apple-system, sans-serif';
  const topicObj = DATA.topics.find(t => t.id === currentTopic);
  ctx.fillText(topicObj ? topicObj.label + ' — Diffusion Timeline' : 'Topic Diffusion', MARGIN.left, 25);

  // Y-axis: institution labels
  ctx.font = '13px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  DATA.institutions.forEach((inst, i) => {
    const y = instToY(i);
    ctx.fillStyle = INST_COLORS[i % INST_COLORS.length];
    ctx.fillText(inst.replace(/University of |The /g, '').substring(0, 32), MARGIN.left - 10, y + 5);
    // Grid line
    ctx.strokeStyle = border;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(MARGIN.left, y);
    ctx.lineTo(w - MARGIN.right, y);
    ctx.stroke();
  });

  // X-axis: year labels
  ctx.textAlign = 'center';
  ctx.fillStyle = fg2;
  for (let yr = 1950; yr <= 2025; yr += 5) {
    const x = yearToX(yr);
    ctx.fillText(yr, x, h - MARGIN.bottom + 20);
    ctx.strokeStyle = border;
    ctx.lineWidth = 0.3;
    ctx.beginPath();
    ctx.moveTo(x, MARGIN.top);
    ctx.lineTo(x, h - MARGIN.bottom);
    ctx.stroke();
  }

  // Current year line
  if (currentYear < 2025) {
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    const cx = yearToX(currentYear);
    ctx.beginPath();
    ctx.moveTo(cx, MARGIN.top);
    ctx.lineTo(cx, h - MARGIN.bottom);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw dots with stable jitter
  const dots = getVisibleDots();
  document.getElementById('dotCount').textContent = dots.length + ' dissertations';
  dots.forEach(d => {
    const x = yearToX(d.year);
    const y = instToY(d.inst_idx);
    const score = d.topics[currentTopic] || 0;
    const r = Math.max(5, Math.min(14, 4 + score * 8));
    const alpha = d.year <= currentYear ? Math.max(0.3, 1 - (currentYear - d.year) * 0.015) : 0;
    const jitter = getJitter(d.did);

    ctx.globalAlpha = alpha;
    ctx.fillStyle = INST_COLORS[d.inst_idx % INST_COLORS.length];
    ctx.beginPath();
    ctx.arc(x, y + jitter, r, 0, Math.PI * 2);
    ctx.fill();

    // Highlight hovered
    if (hoveredDot && hoveredDot.did === d.did) {
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  });
  ctx.globalAlpha = 1;

  // First adoption annotations
  const fa = DATA.firstAdoption[currentTopic] || {};
  ctx.font = '9px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = fg2;
  Object.entries(fa).forEach(([idx, yr]) => {
    if (yr <= currentYear) {
      const x = yearToX(yr);
      const y = instToY(parseInt(idx));
      ctx.fillText('★ ' + yr, x + 8, y - 6);
    }
  });
}

// Jitter cache for consistent positions
const jitterCache = {};
function getJitter(did) {
  if (!jitterCache[did]) jitterCache[did] = Math.random() * 10 - 5;
  return jitterCache[did];
}

// Hit testing
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const dots = getVisibleDots();
  let found = null;
  for (const d of dots) {
    const x = yearToX(d.year);
    const y = instToY(d.inst_idx) + getJitter(d.did);
    const score = d.topics[currentTopic] || 0;
    const r = Math.max(5, Math.min(14, 4 + score * 8));
    const dx = mx - x, dy = my - y;
    if (dx * dx + dy * dy < (r + 4) * (r + 4)) {
      found = d;
      break;
    }
  }

  if (found) {
    hoveredDot = found;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY + 15) + 'px';
    tooltip.innerHTML = `
      <div class="tt-title">${found.title.substring(0, 100)}</div>
      <div class="tt-meta">
        ${found.author} (${found.year})<br>
        ${DATA.institutions[found.inst_idx]}<br>
        ${found.advisor ? 'Advisor: ' + found.advisor : ''}
        <br>Score: ${(found.topics[currentTopic] || 0).toFixed(1)}
      </div>`;
    draw();
  } else {
    if (hoveredDot) { hoveredDot = null; draw(); }
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
  hoveredDot = null;
  draw();
});

// Source toggle handlers
function switchSource(source) {
  currentSource = source;

  // Update active button
  keywordBtn.classList.toggle('active', source === 'keyword');
  nlpBtn.classList.toggle('active', source === 'nlp');
  combinedBtn.classList.toggle('active', source === 'combined');

  // Switch data
  if (source === 'keyword') {
    DATA = KEYWORD_DATA;
  } else if (source === 'nlp') {
    DATA = NLP_DATA;
  } else {
    // Combined: merge both datasets
    DATA = {
      topics: [...KEYWORD_DATA.topics, ...NLP_DATA.topics],
      institutions: KEYWORD_DATA.institutions,
      dissertations: mergeDissertations(KEYWORD_DATA.dissertations, NLP_DATA.dissertations),
      firstAdoption: mergeFirstAdoption(KEYWORD_DATA.firstAdoption, NLP_DATA.firstAdoption),
    };
  }

  populateTopicDropdown();
  draw();
}

function mergeDissertations(diss1, diss2) {
  const merged = {};

  // Add all from first dataset
  diss1.forEach(d => {
    merged[d.did] = {...d, topics: {...d.topics}};
  });

  // Merge topics from second dataset
  diss2.forEach(d => {
    if (merged[d.did]) {
      // Merge topics
      Object.assign(merged[d.did].topics, d.topics);
    } else {
      merged[d.did] = {...d, topics: {...d.topics}};
    }
  });

  return Object.values(merged);
}

function mergeFirstAdoption(fa1, fa2) {
  const merged = {};

  // Copy all from first
  Object.keys(fa1).forEach(tid => {
    merged[tid] = {...fa1[tid]};
  });

  // Merge from second
  Object.keys(fa2).forEach(tid => {
    if (merged[tid]) {
      Object.keys(fa2[tid]).forEach(idx => {
        if (!merged[tid][idx] || fa2[tid][idx] < merged[tid][idx]) {
          merged[tid][idx] = fa2[tid][idx];
        }
      });
    } else {
      merged[tid] = {...fa2[tid]};
    }
  });

  return merged;
}

keywordBtn.addEventListener('click', () => switchSource('keyword'));
nlpBtn.addEventListener('click', () => switchSource('nlp'));
combinedBtn.addEventListener('click', () => switchSource('combined'));

// Controls
topicSelect.addEventListener('change', () => {
  currentTopic = topicSelect.value;
  draw();
});

yearSlider.addEventListener('input', () => {
  currentYear = parseInt(yearSlider.value);
  yearLabel.textContent = currentYear;
  draw();
});

playBtn.addEventListener('click', () => {
  if (playing) {
    clearInterval(playInterval);
    playing = false;
    playBtn.textContent = '▶ Play';
  } else {
    currentYear = 1950;
    yearSlider.value = currentYear;
    yearLabel.textContent = currentYear;
    playing = true;
    playBtn.textContent = '⏸ Pause';
    playInterval = setInterval(() => {
      currentYear++;
      if (currentYear > 2025) {
        clearInterval(playInterval);
        playing = false;
        playBtn.textContent = '▶ Play';
        currentYear = 2025;
      }
      yearSlider.value = currentYear;
      yearLabel.textContent = currentYear;
      draw();
    }, 200);
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'topic_diffusion_timeline.png';
  link.href = canvas.toDataURL();
  link.click();
});

themeBtn.addEventListener('click', () => {
  darkMode = !darkMode;
  document.body.classList.toggle('light-mode', !darkMode);
  themeBtn.textContent = darkMode ? '☀ Light' : '🌙 Dark';
  draw();
});

window.addEventListener('resize', resize);
resize();
