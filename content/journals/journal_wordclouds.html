let currentJournal = 'JAS';
let currentDecade = Object.keys(data['JAS'])[0];
let currentMode = 'single';

const color = d3.scaleOrdinal(d3.schemeTableau10);

function setMode(m) {
    currentMode = m;
    document.getElementById('mode-single').classList.toggle('active', m === 'single');
    document.getElementById('mode-compare').classList.toggle('active', m === 'compare');
    document.getElementById('decade-select-wrap').style.display = m === 'single' ? '' : 'none';
    document.getElementById('cloud').style.display = m === 'single' ? 'flex' : 'none';
    document.getElementById('compare-grid').style.display = m === 'compare' ? 'flex' : 'none';
    if (m === 'single') render(); else renderCompare();
}

// Populate decade selector
function updateDecades() {
    const sel = document.getElementById('decade-select');
    sel.innerHTML = '';
    Object.keys(data[currentJournal] || {}).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        sel.appendChild(opt);
    });
    currentDecade = sel.value;
}

updateDecades();

document.getElementById('journal-select').addEventListener('change', e => {
    currentJournal = e.target.value;
    updateDecades();
    if (currentMode === 'single') render(); else renderCompare();
});

document.getElementById('decade-select').addEventListener('change', e => {
    currentDecade = e.target.value;
    render();
});

document.getElementById('theme-toggle').addEventListener('click', () => {
    document.body.classList.toggle('light-mode');
    document.body.classList.toggle('dark-mode');
    document.getElementById('theme-toggle').textContent =
        document.body.classList.contains('light-mode') ? '🌙 Dark Mode' : '☀️ Light Mode';
    if (currentMode === 'single') render(); else renderCompare();
});

function drawCloud(container, words, width, height, maxWords) {
    const w = words.slice(0, maxWords);
    const maxCount = d3.max(w, d => d.count) || 1;
    const layout = d3.layout.cloud()
        .size([width, height])
        .words(w.map(d => ({ text: d.term, size: (Math.sqrt(d.count / maxCount) * (height * 0.22) + 8) })))
        .padding(3)
        .rotate(() => 0)
        .fontSize(d => d.size)
        .on('end', drawn => {
            const svg = d3.select(container).append('svg')
                .attr('width', width).attr('height', height);
            svg.append('g')
                .attr('transform', `translate(${width/2},${height/2})`)
                .selectAll('text')
                .data(drawn).enter().append('text')
                .style('font-size', d => d.size + 'px')
                .style('fill', (d, i) => color(i % 10))
                .style('font-family', 'Impact, Arial Narrow, sans-serif')
                .attr('text-anchor', 'middle')
                .attr('transform', d => `translate(${d.x},${d.y}) rotate(${d.rotate})`)
                .text(d => d.text)
                .append('title').text(d => `${d.text}: ${w.find(x=>x.term===d.text)?.count || ''}`);
        });
    layout.start();
}

function render() {
    const container = document.getElementById('cloud');
    container.innerHTML = '';
    const words = data[currentJournal]?.[currentDecade] || [];
    if (words.length === 0) { container.innerHTML = '<p style="opacity:0.5">No data</p>'; return; }
    const w = Math.min(container.clientWidth || 900, 1000);
    const h = Math.min(container.clientHeight || 600, 650);
    drawCloud(container, words, w, h, 60);
}

function renderCompare() {
    const grid = document.getElementById('compare-grid');
    grid.innerHTML = '';
    const decades = Object.keys(data[currentJournal] || {});
    const cellW = 260, cellH = 200;
    decades.forEach(decade => {
        const words = data[currentJournal][decade] || [];
        const cell = document.createElement('div');
        cell.className = 'compare-cell';
        cell.title = 'Click to view single';
        cell.innerHTML = `<h3>${decade}</h3>`;
        grid.appendChild(cell);
        drawCloud(cell, words, cellW, cellH, 30);
        cell.addEventListener('click', () => {
            currentDecade = decade;
            document.getElementById('decade-select').value = decade;
            setMode('single');
        });
    });
}

render();
